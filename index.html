<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حصريات حسو</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif}

/* 🔐 LOGIN */
#login{
height:100vh;display:flex;flex-direction:column;
justify-content:center;align-items:center;gap:12px;
}
.title{font-size:28px;color:#f5c518;font-weight:bold}
.code{font-size:42px;color:#f5c518;cursor:pointer}
.box{width:260px;padding:10px;border-radius:10px;text-align:center}
.yellow{background:#f5c518;color:#000;font-weight:bold}
.dark{background:#111;color:#fff;border:none}

/* 📱 APP */
#app{display:none}

.top{display:flex;justify-content:space-between;padding:10px;background:#111}

.contact{
display:block;background:#f5c518;color:#000;
text-align:center;padding:10px;font-weight:bold;text-decoration:none;
}

/* 📦 GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#111;
border-radius:12px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

/* 🖼 VIEWER */
.viewer{
position:fixed;
inset:0;
background:#000;
z-index:9999;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.viewer img{
max-width:100%;
max-height:80vh;
border-radius:10px;
transition:.25s;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login">
  <div class="title">حصريات حسو</div>
  <div class="code" onclick="copy()">1234</div>
  <div class="box yellow" onclick="copy()">نسخ</div>
  <input id="code" class="box dark" placeholder="كلمة المرور">
  <button class="box yellow" onclick="enter()">دخول</button>
</div>

<!-- 📱 APP -->
<div id="app">

<div class="top">
  <div>🟢 متصل</div>
  <div>حصريات حسو</div>
</div>

<a class="contact" href="https://t.me/xxnnn8" target="_blank">
التواصل معنا @xxnnn8
</a>

<div id="count" style="padding:10px">تحميل...</div>

<div class="grid" id="grid"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxXHimt8YCbt4wUPves03ewIZdQZ0P-UqJlUc0TosKE0ixqRANx5H9B_eakod608_OE/exec";

let data=[];

/* نسخ */
function copy(){
navigator.clipboard.writeText("1234");
}

/* دخول */
function enter(){
if(code.value!=="1234") return;
login.style.display="none";
app.style.display="block";
load();
}

/* 🔥 تحميل ودمج الألبومات */
async function load(){

const res=await fetch(API+"?t="+Date.now());
let json=await res.json();

if(!Array.isArray(json)) json=[json];

let map={};

json.forEach(x=>{

let name=String(x.name || "بدون اسم");

let links=String(x.video||"")
.split(" - ")
.map(e=>e.trim())
.filter(e=>e.startsWith("http"));

if(!map[name]) map[name]=[];

map[name].push(...links);

});

data=Object.keys(map).map(name=>({
name,
links:map[name],
cover:map[name][0]
}));

count.innerText=data.length+" ألبوم";

render();

}

/* عرض */
function render(){
grid.innerHTML=data.map((a,i)=>`
<div class="card" onclick="openAlbum(${i})">
<img src="${a.cover}" onerror="this.src='https://via.placeholder.com/300'">
</div>
`).join("");
}

/* فتح الألبوم */
function openAlbum(i){

let a=data[i];
let index=0;

let v=document.createElement("div");
v.className="viewer";

v.innerHTML=`
<div style="position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;">
<button onclick="this.parentElement.parentElement.remove()">رجوع</button>
<div id="counter">1/${a.links.length}</div>
</div>

<img id="img" src="${a.links[0]}" 
onerror="this.src='https://via.placeholder.com/300'">
`;

document.body.appendChild(v);

let img=v.querySelector("#img");
let counter=v.querySelector("#counter");

/* تغيير */
function change(i2){
img.style.opacity=0;
setTimeout(()=>{
index=i2;
img.src=a.links[index];
counter.innerText=(index+1)+"/"+a.links.length;
img.style.opacity=1;
},150);
}

/* ضغط */
img.onclick=()=>change((index+1)%a.links.length);

/* سحب */
let start=0;

img.ontouchstart=e=>start=e.touches[0].clientX;

img.ontouchend=e=>{
let end=e.changedTouches[0].clientX;

if(end<start-50) change((index+1)%a.links.length);
if(end>start+50) change((index-1+a.links.length)%a.links.length);
};

}

</script>

</body>
</html>
