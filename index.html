<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حصريات حسو</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;
}

/* login */
#login{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}

.title{color:#f5c518;font-size:30px;font-weight:bold}
input{padding:10px;width:250px;text-align:center;border-radius:10px;border:none}
button{padding:10px;width:250px;border:none;border-radius:10px;background:#f5c518;font-weight:bold}

/* app */
#app{display:none}

.top{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
}

.contact{
  display:block;
  background:#f5c518;
  color:#000;
  text-align:center;
  padding:10px;
  font-weight:bold;
  text-decoration:none;
}

/* albums grid */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:#111;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

/* viewer */
.viewer{
  position:fixed;
  inset:0;
  background:#000;
  z-index:9999;
  overflow-y:auto;
  padding-top:60px;
}

.viewer img{
  width:100%;
  max-width:600px;
  display:block;
  margin:10px auto;
  border-radius:10px;
  transition:.25s;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="title">حصريات حسو</div>
  <h1 onclick="copy()">1234</h1>
  <input id="code" placeholder="كلمة المرور">
  <button onclick="enter()">دخول</button>
</div>

<!-- APP -->
<div id="app">

<div class="top">
  <div>🟢 متصل</div>
  <div>حصريات حسو</div>
</div>

<a class="contact" href="https://t.me/xxnnn8" target="_blank">
التواصل معنا @xxnnn8
</a>

<div id="count" style="padding:10px;">جاري التحميل...</div>
<div class="grid" id="grid"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxXHimt8YCbt4wUPves03ewIZdQZ0P-UqJlUc0TosKE0ixqRANx5H9B_eakod608_OE/exec";

let data=[];

function copy(){
  navigator.clipboard.writeText("1234");
}

function enter(){
  if(code.value!=="1234") return;
  login.style.display="none";
  app.style.display="block";
  load();
}

/* 🔥 تحميل الألبومات */
async function load(){
  try{
    const res=await fetch(API+"?t="+Date.now(),{cache:"no-store"});
    const json=await res.json();

    if(!Array.isArray(json)){
      count.innerText="❌ لا توجد بيانات";
      return;
    }

    data=json.map(x=>{

      let name=x.B || "بدون اسم";

      let raw=x.C || "";

      let links=String(raw)
        .split(" - ")
        .map(e=>e.trim())
        .filter(e=>e.startsWith("http"));

      return{
        name,
        cover:links[0],
        links
      };
    });

    count.innerText=data.length+" ألبوم";
    render();

  }catch(e){
    count.innerText="❌ خطأ تحميل";
  }
}

/* عرض الألبومات */
function render(){
  grid.innerHTML=data.map((a,i)=>`
    <div class="card" onclick="openAlbum(${i})">
      <img src="${a.cover}">
    </div>
  `).join("");
}

/* 🔥 فتح الألبوم */
function openAlbum(i){

  let a=data[i];
  let index=0;

  let v=document.createElement("div");
  v.className="viewer";

  v.innerHTML=`
    <div style="position:fixed;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;z-index:999;">
      
      <button onclick="this.closest('.viewer').remove()"
        style="background:#f5c518;color:#000;border:none;padding:8px 12px;border-radius:8px;font-weight:bold;">
        رجوع
      </button>

      <div id="counter">1 / ${a.links.length}</div>
    </div>

    <img id="img" src="${a.links[0]}">
  `;

  document.body.appendChild(v);

  const img=v.querySelector("#img");
  const counter=v.querySelector("#counter");

  function change(newIndex,dir){

    img.style.opacity=0;
    img.style.transform=dir>0?"translateX(50px)":"translateX(-50px)";

    setTimeout(()=>{

      index=newIndex;
      img.src=a.links[index];
      counter.innerText=(index+1)+" / "+a.links.length;

      img.style.transform="translateX(0)";
      img.style.opacity=1;

    },150);
  }

  img.onclick=()=>{
    change((index+1)%a.links.length,1);
  };

  let startX=0;

  img.addEventListener("touchstart",e=>{
    startX=e.touches[0].clientX;
  });

  img.addEventListener("touchend",e=>{
    let endX=e.changedTouches[0].clientX;

    if(endX<startX-50){
      change((index+1)%a.links.length,1);
    }else if(endX>startX+50){
      change((index-1+a.links.length)%a.links.length,-1);
    }
  });

}

</script>

</body>
</html>
