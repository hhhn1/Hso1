<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عينات حسو VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --gold: #c9a050;
            --bg: #000000; /* خلفية سوداء دائمة */
            --card-bg: #111111;
            --text: #ffffff;
            --input-bg: #1a1a1a;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
        }

        /* شاشة القفل */
        #lock-screen {
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            text-align: center;
            transition: opacity 0.6s ease;
            background: radial-gradient(circle, #111 0%, #000 100%);
        }

        .main-title { font-size: 40px; font-weight: 900; color: var(--gold); margin: 0; }
        .divider { width: 70px; height: 3px; background: var(--gold); margin: 15px auto; border-radius: 10px; }

        .btn-copy { 
            background: transparent; color: var(--gold); border: 1px solid var(--gold); 
            padding: 8px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; 
            margin-bottom: 30px; transition: 0.3s;
        }
        .btn-copy:active { background: var(--gold); color: #000; }

        .input-vip { 
            width: 80%; padding: 18px; border-radius: 15px; border: 1px solid #333; 
            background: var(--input-bg); color: #fff; text-align: center; 
            font-size: 24px; margin-bottom: 20px; outline: none;
        }

        .btn-enter { 
            width: 80%; padding: 18px; border-radius: 15px; border: none; 
            background: linear-gradient(45deg, #c9a050, #f9e29b); 
            color: #000; font-weight: 900; font-size: 20px; cursor: pointer;
        }

        /* واجهة المحتوى */
        #content { display: none; opacity: 0; padding: 15px; transition: 1s; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { 
            background: var(--card-bg); border-radius: 12px; overflow: hidden; 
            border: 1px solid #222; transition: transform 0.2s;
        }
        .media-box { width: 100%; height: 180px; background: #000; position: relative; }
        .media-box img, .media-box video { width: 100%; height: 100%; object-fit: cover; }
        
        .card-info { padding: 10px; text-align: right; border-top: 1px solid #222; }
        .card-title { font-size: 11px; font-weight: bold; color: #ddd; }

        /* عارض المحتوى */
        #viewer { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 10000; display: none; 
            flex-direction: column; overflow-y: auto; 
        }
        .viewer-item { width: 100%; margin-bottom: 8px; border-bottom: 1px solid #111; }
        .viewer-item img, .viewer-item video { width: 100%; display: block; }
        .close-btn { 
            position: sticky; top: 15px; right: 15px; z-index: 10001; 
            background: var(--gold); border: none; padding: 10px 25px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; color: #000;
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h1 class="main-title">عينات حسو</h1>
        <div class="divider"></div>
        <p style="color: #666; font-size: 14px;">الوصول للمحتوى الحصري</p>
        
        <div id="targetCode" style="font-size:35px; font-weight:900; margin: 10px 0; color: #fff;">----</div>
        <button class="btn-copy" onclick="copyCode()">نسخ الرمز</button>

        <input type="number" id="passInput" class="input-vip" placeholder="ادخل الرمز">
        <button class="btn-enter" onclick="checkPass()">دخول آمن</button>
    </div>

    <div id="content">
        <div class="header">
             <div style="font-weight: 900; font-size: 22px;">📂 الألبومات</div>
             <a href="https://t.me/xxnnn8" style="color:var(--gold); text-decoration:none; font-size: 14px; font-weight: bold;">@xxnnn8</a>
        </div>
        <div id="items-list" class="gallery"></div>
        <div style="text-align:center; padding:50px; color:#333; font-size:11px;">جميع الحقوق محفوظة لدى حسو VIP</div>
    </div>

    <div id="viewer">
        <button class="close-btn" onclick="closeViewer()">إغلاق</button>
        <div id="viewer-content"></div>
    </div>

    <script>
        // رابط جوجل شيت الخاص بك
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS4V6swf_1fE33kPaIG6nNS4lbf6Ii87Hxx9hKnR_xDvE4vpbm8SG2ZrPaGoMky5NGpAt-tkNzv7L4j/pub?output=csv";
        let correctPass = "";

        async function init() {
            try {
                const resp = await fetch(CSV_URL);
                const text = await resp.text();
                const rows = text.split('\n').slice(1);
                
                // الحصول على الرمز من الخلية الأولى
                correctPass = rows[0].split(',')[0].trim();
                document.getElementById('targetCode').innerText = correctPass;

                const list = document.getElementById('items-list');
                rows.forEach(row => {
                    const cols = row.split(',');
                    if(cols[1] && cols[1].trim()) {
                        // تنظيف الروابط من المسافات
                        const urls = cols[1].split(',').map(u => u.trim()).filter(u => u !== "");
                        const firstUrl = urls[0];
                        const title = cols[2] ? cols[2].trim() : 'ألبوم جديد';
                        const isVid = firstUrl.toLowerCase().endsWith('.mp4');
                        
                        list.innerHTML += `
                            <div class="card" onclick='openViewer(${JSON.stringify(urls)})'>
                                <div class="media-box">
                                    ${isVid ? `<video muted loop playsinline><source src="${firstUrl}" type="video/mp4"></video>` : `<img src="${firstUrl}" loading="lazy">`}
                                </div>
                                <div class="card-info"><div class="card-title">${title}</div></div>
                            </div>`;
                    }
                });
            } catch (e) { console.log("Error loading"); }
        }

        function checkPass() {
            if(document.getElementById('passInput').value === correctPass) {
                document.getElementById('lock-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('lock-screen').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                    setTimeout(() => document.getElementById('content').style.opacity = '1', 50);
                }, 600);
                window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
            } else { 
                alert("الرمز خطأ");
                window.Telegram.WebApp.HapticFeedback.notificationOccurred('error');
            }
        }

        function openViewer(urls) {
            const cont = document.getElementById('viewer-content');
            cont.innerHTML = '';
            urls.forEach(u => {
                const isV = u.toLowerCase().endsWith('.mp4');
                cont.innerHTML += `<div class="viewer-item">${isV ? `<video controls autoplay loop muted><source src="${u}" type="video/mp4"></video>` : `<img src="${u}">`}</div>`;
            });
            document.getElementById('viewer').style.display = 'block';
            window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
        }

        function closeViewer() { 
            document.getElementById('viewer').style.display = 'none'; 
            document.getElementById('viewer-content').innerHTML = ''; // إيقاف الفيديوهات عند الإغلاق
        }

        function copyCode() { 
            navigator.clipboard.writeText(correctPass); 
            alert("تم نسخ الرمز "); 
        }

        init();
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
