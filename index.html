<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عينات حسو VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #c9a050; --bg: #000000; --card-bg: #1a1d23; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: #fff; margin: 0; overflow-x: hidden; }

        /* فيديو الواجهة الخلفية */
        #video-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1; opacity: 0.7; filter: brightness(0.5);
            transition: opacity 0.8s ease;
        }

        /* شاشة القفل */
        #lock-screen {
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            position: relative; z-index: 10; transition: opacity 0.6s ease;
        }

        .main-title { font-size: 45px; font-weight: 900; color: var(--gold); text-shadow: 0 0 20px rgba(0,0,0,0.8); margin: 0; }
        .divider { width: 80px; height: 4px; background: var(--gold); margin: 15px auto; border-radius: 10px; }

        .btn-copy { 
            background: #000; color: var(--gold); border: 1px solid var(--gold); 
            padding: 12px 35px; border-radius: 50px; font-weight: bold; 
            cursor: pointer; margin-bottom: 30px; font-size: 16px;
        }

        .input-vip { 
            width: 85%; padding: 18px; border-radius: 20px; border: 1px solid rgba(201,160,80,0.4); 
            background: rgba(0, 0, 0, 0.6); color: #fff; text-align: center; 
            font-size: 20px; margin-bottom: 20px; backdrop-filter: blur(5px); outline: none;
        }

        .btn-enter { 
            width: 85%; padding: 20px; border-radius: 20px; border: none; 
            background: linear-gradient(45deg, #c9a050, #f9e29b); 
            color: #000; font-weight: 900; font-size: 20px; cursor: pointer;
        }

        /* واجهة المحتوى (تظهر خلفية سوداء هنا) */
        #content { padding: 15px; display: none; opacity: 0; transition: 1s; position: relative; z-index: 5; background: #000; min-height: 100vh; }
        .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-top: 10px; }
        
        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: var(--card-bg); border-radius: 15px; overflow: hidden; position: relative; border: 1px solid #222; }
        .media-box { width: 100%; height: 200px; background: #000; }
        .media-box img, .media-box video { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 12px; background: #111; text-align: right; border-top: 1px solid #222; }
        .card-title { font-size: 12px; font-weight: bold; color: #eee; }

        /* عارض الصور المباشر */
        #viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: none; flex-direction: column; overflow-y: auto; }
        .viewer-item { width: 100%; margin-bottom: 10px; border-bottom: 1px solid #222; }
        .viewer-item img, .viewer-item video { width: 100%; display: block; }
        .close-btn { position: sticky; top: 10px; right: 10px; z-index: 10001; background: var(--gold); border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <video id="video-bg" autoplay muted loop playsinline>
        <source src="https://g.top4top.io/m_3757i0f3j1.mp4" type="video/mp4">
    </video>

    <div id="lock-screen">
        <h1 class="main-title">عينات حسو</h1>
        <div class="divider"></div>
        <p style="color: #ccc; margin-bottom: 15px;">ادخل الرمز</p>
        
        <div id="targetCode" style="font-size:35px; font-weight:900; margin-bottom:10px; color: #fff;">1234</div>
        <button class="btn-copy" onclick="copyCode()">نسخ الرمز</button>

        <input type="number" id="passInput" class="input-vip" placeholder="••••">
        <button class="btn-enter" onclick="checkPass()">فتح الألبومات</button>
    </div>

    <div id="content">
        <div class="top-header">
            <a href="https://t.me/xxnnn8" style="text-decoration:none; color:var(--gold); font-weight:bold; border: 1px solid #333; padding: 5px 15px; border-radius: 10px;">@xxnnn8</a>
            <div style="font-weight: bold; font-size: 18px;">📂 الألبومات</div>
        </div>
        <div id="items-list" class="gallery"></div>
        <div style="text-align:center; padding:50px; color:#444; font-size:12px;">جميع الحقوق محفوظة لدى حسو <br> @xxnnn8</div>
    </div>

    <div id="viewer">
        <button class="close-btn" onclick="closeViewer()">إغلاق</button>
        <div id="viewer-content"></div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS4V6swf_1fE33kPaIG6nNS4lbf6Ii87Hxx9hKnR_xDvE4vpbm8SG2ZrPaGoMky5NGpAt-tkNzv7L4j/pub?output=csv";
        let correctPass = "";

        async function init() {
            try {
                const resp = await fetch(CSV_URL);
                const text = await resp.text();
                const rows = text.split('\n').slice(1);
                correctPass = rows[0].split(',')[0].trim();
                document.getElementById('targetCode').innerText = correctPass;

                const list = document.getElementById('items-list');
                rows.forEach(row => {
                    const cols = row.split(',');
                    if(cols[1] && cols[1].trim()) {
                        const urls = cols[1].split(',').map(u => u.trim());
                        const firstUrl = urls[0];
                        const isVid = firstUrl.toLowerCase().endsWith('.mp4');
                        list.innerHTML += `
                            <div class="card" onclick='openViewer(${JSON.stringify(urls)})'>
                                <div class="media-box">
                                    ${isVid ? `<video muted loop playsinline><source src="${firstUrl}" type="video/mp4"></video>` : `<img src="${firstUrl}" loading="lazy">`}
                                </div>
                                <div class="card-info"><div class="card-title">${cols[2] || 'ألبوم جديد'}</div></div>
                            </div>`;
                    }
                });
            } catch (e) {}
        }

        function checkPass() {
            if(document.getElementById('passInput').value === correctPass) {
                // تأثير الاختفاء
                document.getElementById('lock-screen').style.opacity = '0';
                document.getElementById('video-bg').style.opacity = '0';
                
                setTimeout(() => {
                    document.getElementById('lock-screen').style.display = 'none';
                    document.getElementById('video-bg').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                    setTimeout(() => document.getElementById('content').style.opacity = '1', 50);
                }, 700);
                window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
            } else { 
                alert("الرمز خطأ"); 
                window.Telegram.WebApp.HapticFeedback.notificationOccurred('error');
            }
        }

        function openViewer(urls) {
            const cont = document.getElementById('viewer-content');
            cont.innerHTML = '';
            urls.forEach(u => {
                const isV = u.toLowerCase().endsWith('.mp4');
                cont.innerHTML += `<div class="viewer-item">${isV ? `<video controls autoplay loop muted><source src="${u}" type="video/mp4"></video>` : `<img src="${u}">`}</div>`;
            });
            document.getElementById('viewer').style.display = 'block';
            window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
        }

        function closeViewer() { document.getElementById('viewer').style.display = 'none'; }
        function copyCode() { 
            navigator.clipboard.writeText(correctPass); 
            window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
            alert("تم النسخ"); 
        }

        init();
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
