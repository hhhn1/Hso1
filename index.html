<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حصريات حسو</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif}

/* LOGIN */
#login{
height:100vh;display:flex;flex-direction:column;
justify-content:center;align-items:center;gap:12px;
}
.title{font-size:28px;color:#f5c518;font-weight:bold}
.code{font-size:42px;color:#f5c518;cursor:pointer}
.box{width:260px;padding:10px;border-radius:10px;text-align:center}
.yellow{background:#f5c518;color:#000;font-weight:bold}
.dark{background:#111;color:#fff;border:none}

/* APP */
#app{display:none}

.top{display:flex;justify-content:space-between;padding:10px;background:#111}

.contact{
display:block;background:#f5c518;color:#000;
text-align:center;padding:10px;font-weight:bold;text-decoration:none;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#111;
border-radius:12px;
overflow:hidden;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

/* VIEWER */
.viewer{
position:fixed;
inset:0;
background:#000;
z-index:9999;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

.viewer img{
max-width:100%;
max-height:90vh;
transition:.2s;
touch-action:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="title">حصريات حسو</div>
  <div class="code" onclick="copy()">1234</div>
  <div class="box yellow" onclick="copy()">نسخ</div>
  <input id="code" class="box dark" placeholder="كلمة المرور">
  <button class="box yellow" onclick="enter()">دخول</button>
</div>

<!-- APP -->
<div id="app">

<div class="top">
  <div>🟢 متصل</div>
  <div>حصريات حسو</div>
</div>

<a class="contact" href="https://t.me/xxnnn8" target="_blank">
التواصل معنا @xxnnn8
</a>

<div id="count" style="padding:10px">تحميل...</div>

<div class="grid" id="grid"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxXHimt8YCbt4wUPves03ewIZdQZ0P-UqJlUc0TosKE0ixqRANx5H9B_eakod608_OE/exec";

let data=[];

/* INFINITE SCROLL */
let page=0;
let limit=6;

/* LOGIN */
function copy(){
navigator.clipboard.writeText("1234");
}

function enter(){
if(code.value!=="1234") return;
login.style.display="none";
app.style.display="block";
load();
}

/* LOAD */
async function load(){

const res=await fetch(API+"?t="+Date.now());
let json=await res.json();

if(!Array.isArray(json)) json=[json];

let map={};

json.forEach(x=>{

let name=String(x.name || "بدون اسم");

let links=String(x.video||"")
.split(" - ")
.map(e=>e.trim())
.filter(e=>e.startsWith("http"));

if(!map[name]) map[name]=[];

map[name].push(...links);

});

data=Object.keys(map).map(name=>({
name,
links:map[name],
cover:map[name][0]
}));

count.innerText=data.length+" ألبوم";

grid.innerHTML="";
page=0;
render();

}

/* RENDER (INFINITE) */
function render(){

let start=page*limit;
let end=start+limit;

let part=data.slice(start,end);

grid.innerHTML += part.map((a,i)=>`
<div class="card" onclick="openAlbum(${start+i})">
<img src="${a.cover}" loading="lazy"
onerror="this.src='https://via.placeholder.com/300'">
</div>
`).join("");

}

/* SCROLL */
window.addEventListener("scroll",()=>{

if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 200){

page++;

if(page*limit < data.length){
render();
}

}

});

/* OPEN ALBUM */
function openAlbum(i){

let a=data[i];

let v=document.createElement("div");
v.className="viewer";
v.style.overflow="auto";

v.innerHTML=`
<div style="position:fixed;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;">
<button onclick="this.closest('.viewer').remove()">رجوع</button>
<div>${a.name} (${a.links.length})</div>
</div>

<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:60px 10px;">
${a.links.map((img,i)=>`
<img src="${img}" loading="lazy"
onclick="openImage(${i}, ${JSON.stringify(a.links).replace(/"/g,'&quot;')})"
style="width:100%;border-radius:10px"
onerror="this.src='https://via.placeholder.com/300'">
`).join("")}
</div>
`;

document.body.appendChild(v);

}

/* OPEN IMAGE + ZOOM */
function openImage(index, links){

let scale=1;

let v=document.createElement("div");
v.className="viewer";

v.innerHTML=`
<div style="position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;">
<button onclick="this.closest('.viewer').remove()">رجوع</button>
<div id="counter"></div>
</div>

<img id="img">
`;

document.body.appendChild(v);

let img=v.querySelector("#img");
let counter=v.querySelector("#counter");

function show(){
img.src=links[index];
counter.innerText=(index+1)+"/"+links.length;
scale=1;
img.style.transform="scale(1)";
}

show();

/* next / prev */
function next(){ index=(index+1)%links.length; show(); }
function prev(){ index=(index-1+links.length)%links.length; show(); }

img.onclick=next;

/* swipe */
let startX=0;

img.ontouchstart=e=>{
startX=e.touches[0].clientX;
};

img.ontouchend=e=>{
let endX=e.changedTouches[0].clientX;

if(endX<startX-50) next();
if(endX>startX+50) prev();
};

/* ZOOM (double tap) */
img.ondblclick=()=>{
scale = scale===1 ? 2 : 1;
img.style.transform=`scale(${scale})`;
};

}

</script>

</body>
</html>
