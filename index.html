<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حصريات حسو</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:#000;
  color:#fff;
}

/* LOGIN */
#login{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:12px;
}

.title{font-size:30px;font-weight:900;color:#f5c518;}
.code{font-size:50px;font-weight:900;color:#f5c518;cursor:pointer;}

.input{
  width:300px;
  padding:12px;
  text-align:center;
  border-radius:10px;
  border:none;
  background:#111;
  color:#fff;
}

.btn{
  width:300px;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:900;
  background:#f5c518;
  color:#000;
}

/* APP */
#app{display:none;}

.top{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
}

.online{color:#00ff66;}

.contact{
  display:block;
  background:#f5c518;
  color:#000;
  text-align:center;
  padding:10px;
  font-weight:900;
  text-decoration:none;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:#111;
  border-radius:12px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.viewer{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  flex-direction:column;
}

.viewer img{
  max-width:100%;
  max-height:85vh;
  margin:auto;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="title">حصريات حسو</div>
  <div class="code" onclick="copy()">1234</div>
  <button class="btn" onclick="copy()">نسخ</button>
  <input id="code" class="input" placeholder="كلمة المرور">
  <button class="btn" onclick="enter()">دخول</button>
</div>

<!-- APP -->
<div id="app">

  <div class="top">
    <div class="online">🟢 متصل الآن</div>
    <div>حصريات حسو</div>
  </div>

  <a href="https://t.me/xxnnn8" target="_blank" class="contact">
    للتواصل معنا @xxnnn8
  </a>

  <div id="count" style="padding:10px;">جاري التحميل...</div>

  <div class="grid" id="grid"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxXHimt8YCbt4wUPves03ewIZdQZ0P-UqJlUc0TosKE0ixqRANx5H9B_eakod608_OE/exec";

let data=[];

function copy(){
  navigator.clipboard.writeText("1234");
}

function enter(){
  if(document.getElementById("code").value!=="1234") return;

  login.style.display="none";
  app.style.display="block";

  load();
}

/* 🔥 تحميل مضبوط على B و C */
async function load(){
  try{
    const res=await fetch(API+"?t="+Date.now(),{cache:"no-store"});
    const text=await res.text();

    let json;
    try{
      json=JSON.parse(text);
    }catch{
      count.innerText="❌ خطأ API";
      return;
    }

    if(!Array.isArray(json)){
      count.innerText="❌ بيانات غير صحيحة";
      return;
    }

    data=json.map(x=>{

      // 👇 العنوان من B
      let name = x.B || x.name || x.Name || "بدون اسم";

      // 👇 الروابط من C
      let raw = x.C || x.video || x.Video || "";

      let links = String(raw)
        .split(" - ")
        .map(e=>e.trim())
        .filter(e=>e.startsWith("http"));

      return{
        name:name,
        cover:links[0] || "https://via.placeholder.com/300",
        links:links.length ? links : ["https://via.placeholder.com/300"]
      };
    });

    count.innerText = data.length + " ألبوم";

    render();

  }catch(e){
    count.innerText="❌ فشل الاتصال";
  }
}

function render(){
  if(!data.length){
    grid.innerHTML="<div style='padding:20px'>لا توجد بيانات</div>";
    return;
  }

  grid.innerHTML=data.map((a,i)=>`
    <div class="card" onclick="openAlbum(${i})">
      <img src="${a.cover}" loading="lazy"
      onerror="this.src='https://via.placeholder.com/300'">
    </div>
  `).join("");
}

function openAlbum(i){

  let a=data[i];
  let index=0;

  let v=document.createElement("div");
  v.className="viewer";

  v.innerHTML=`
    <button onclick="this.parentElement.remove()">إغلاق</button>
    <img id="img" src="${a.links[0]}"
    onerror="this.src='https://via.placeholder.com/300'">
  `;

  document.body.appendChild(v);

  const img=v.querySelector("#img");

  img.onclick=()=>{
    index=(index+1)%a.links.length;
    img.src=a.links[index];
  };
}

</script>

</body>
</html>
