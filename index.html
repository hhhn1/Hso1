<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عينات حسو VIP - PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #c9a050; --bg: #000000; --card-bg: #111111; --text: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }
        
        /* شاشة القفل */
        #lock-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: radial-gradient(circle, #111 0%, #000 100%); transition: 0.6s; }
        .main-title { font-size: 40px; font-weight: 900; color: var(--gold); margin: 0; }
        .input-vip { width: 80%; padding: 18px; border-radius: 15px; border: 1px solid #333; background: #1a1a1a; color: #fff; text-align: center; font-size: 24px; margin: 20px 0; outline: none; }
        .btn-enter { width: 80%; padding: 18px; border-radius: 15px; border: none; background: linear-gradient(45deg, #c9a050, #f9e29b); color: #000; font-weight: 900; font-size: 20px; cursor: pointer; }

        /* الواجهة الرئيسية */
        #content { display: none; opacity: 0; padding: 15px; transition: 1s; }
        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #222; }
        .media-box { width: 100%; height: 180px; background: #000; position: relative; }
        .media-box img, .media-box video { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 10px; text-align: right; border-top: 1px solid #222; }
        .card-title { font-size: 11px; font-weight: bold; color: #ddd; }

        /* عارض المحتوى */
        #viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: none; flex-direction: column; overflow-y: auto; }
        .viewer-item { width: 100%; margin-bottom: 8px; }
        .viewer-item img, .viewer-item video { width: 100%; display: block; }
        .close-btn { position: sticky; top: 15px; right: 15px; z-index: 10001; background: var(--gold); border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; color: #000; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h1 class="main-title">عينات حسو</h1>
        <div style="width: 70px; height: 3px; background: var(--gold); margin: 15px auto;"></div>
        <p style="color: #666; font-size: 12px;">نظام الـ API السريع</p>
        <input type="number" id="passInput" class="input-vip" placeholder="ادخل الرمز">
        <button class="btn-enter" onclick="checkPass()">دخول ملكي ⚡</button>
    </div>

    <div id="content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
             <div style="font-weight: 900; font-size: 22px;">📂 الألبومات</div>
             <a href="https://t.me/xxnnn8" style="color:var(--gold); text-decoration:none; font-weight: bold;">@xxnnn8</a>
        </div>
        <div id="items-list" class="gallery"></div>
    </div>

    <div id="viewer">
        <button class="close-btn" onclick="closeViewer()">إغلاق</button>
        <div id="viewer-content"></div>
    </div>

    <script>
        // الرابط الخاص بك تم دمجه هنا تلقائياً
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwTsq5C9s1gv-uz_NJMNMDZqFHKSzP6h5dIO-hOQrlv2m8mpY11alQdcJ5c9EERS1Md/exec"; 
        
        let correctPass = "";
        let albumsData = [];

        async function init() {
            try {
                const resp = await fetch(SCRIPT_URL);
                albumsData = await resp.json();
                
                // الرمز يقرأ من أول عنصر في مصفوفة الـ API
                if(albumsData.length > 0) {
                    correctPass = albumsData[0].code.toString().trim();
                }

                const list = document.getElementById('items-list');
                albumsData.forEach(item => {
                    if(item.links) {
                        const urls = item.links.split(',').map(u => u.trim());
                        const firstUrl = urls[0];
                        const isVid = firstUrl.toLowerCase().endsWith('.mp4');
                        list.innerHTML += `
                            <div class="card" onclick='openViewer(${JSON.stringify(urls)})'>
                                <div class="media-box">
                                    ${isVid ? `<video muted loop playsinline><source src="${firstUrl}" type="video/mp4"></video>` : `<img src="${firstUrl}">`}
                                </div>
                                <div class="card-info"><div class="card-title">${item.title || 'ألبوم حصري'}</div></div>
                            </div>`;
                    }
                });
            } catch (e) {
                console.error("API Error");
            }
        }

        function checkPass() {
            if(document.getElementById('passInput').value === correctPass) {
                document.getElementById('lock-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('lock-screen').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                    setTimeout(() => document.getElementById('content').style.opacity = '1', 50);
                }, 600);
            } else { alert("الرمز خطأ"); }
        }

        function openViewer(urls) {
            const cont = document.getElementById('viewer-content');
            cont.innerHTML = '';
            urls.forEach(u => {
                const isV = u.toLowerCase().endsWith('.mp4');
                cont.innerHTML += `<div class="viewer-item">${isV ? `<video controls autoplay loop muted><source src="${u}" type="video/mp4"></video>` : `<img src="${u}">`}</div>`;
            });
            document.getElementById('viewer').style.display = 'block';
        }

        function closeViewer() { 
            document.getElementById('viewer').style.display = 'none';
            document.getElementById('viewer-content').innerHTML = '';
        }

        init();
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
