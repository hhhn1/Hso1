<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق الألبومات</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #000; color: #fff; margin: 0; padding: 15px; text-align: center; }
        .hidden { display: none; }
        #lock-screen { margin-top: 50px; }
        input { width: 85%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 18px; margin-bottom: 15px; }
        button { width: 90%; padding: 15px; border-radius: 12px; border: none; background: #f39c12; color: #000; font-weight: bold; font-size: 16px; cursor: pointer; }
        .card { background: #111; border-radius: 15px; margin-bottom: 20px; border: 1px solid #222; overflow: hidden; }
        .card img { width: 100%; display: block; background: #222; }
        .card .info { padding: 12px; font-size: 14px; color: #ccc; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h2>🔒 أدخل كلمة المرور</h2>
        <input type="number" id="passInput" placeholder="الرمز...">
        <button onclick="checkPass()">دخول</button>
    </div>

    <div id="content" class="hidden">
        <div id="items-list"></div>
    </div>

    <script>
        // ضع الرابط الخاص بك هنا بين العلامتين "https://docs.google.com/spreadsheets/d/e/2PACX-1vS4V6swf_1fE33kPaIG6nNS4lbf6Ii87Hxx9hKnR_xDvE4vpbm8SG2ZrPaGoMky5NGpAt-tkNzv7L4j/pub?output=csv"
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS4V6swf_1fE33kPaIG6nNS4lbf6Ii87Hxx9hKnR_xDvE4vpbm8SG2ZrPaGoMky5NGpAt-tkNzv7L4j/pub?output=csv";
        
        let correctPass = "";

        async function init() {
            try {
                const resp = await fetch(CSV_URL);
                const text = await resp.text();
                const rows = text.split('\n').slice(1); // تجاهل سطر العناوين

                // قراءة الرمز من أول صف (الخلية A2)
                const firstRowCols = rows[0].split(',');
                correctPass = firstRowCols[0].trim();

                const list = document.getElementById('items-list');
                rows.forEach(row => {
                    const cols = row.split(',');
                    const imgUrl = cols[1] ? cols[1].trim() : "";
                    const info = cols[2] ? cols[2].trim() : "";
                    
                    if(imgUrl && imgUrl.startsWith('http')) {
                        list.innerHTML += `
                            <div class="card">
                                <img src="${imgUrl}">
                                <div class="info">${info}</div>
                            </div>`;
                    }
                });
            } catch (e) {
                console.error("خطأ في جلب البيانات");
            }
        }

        function checkPass() {
            const input = document.getElementById('passInput').value;
            if(input === correctPass) {
                document.getElementById('lock-screen').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
                window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
            } else {
                alert("الرمز غير صحيح!");
            }
        }

        init();
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand(); // يخلي التطبيق يفتح شاشة كاملة
    </script>
</body>
</html>
