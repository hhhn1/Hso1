<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عينات حسو - VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #c9a050; --bg: #0f1115; --card-bg: #1a1d23; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); color: #fff; margin: 0; padding: 15px; 
        }

        /* الهيدر العلوي مثل الصورة */
        .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 5px; }
        .contact-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid #333;
            padding: 8px 15px; border-radius: 12px; display: flex; align-items: center;
            text-decoration: none; color: #fff; font-size: 13px;
        }
        .online-dot { width: 8px; height: 8px; background: #4caf50; border-radius: 50%; margin-left: 8px; box-shadow: 0 0 5px #4caf50; }
        .contact-user { color: var(--gold); font-weight: bold; margin-right: 5px; }

        .album-title { font-size: 20px; font-weight: bold; display: flex; align-items: center; gap: 8px; }

        /* شريط البحث */
        .search-container {
            background: #1e222a; border-radius: 15px; padding: 12px 15px;
            display: flex; align-items: center; margin-bottom: 20px; border: 1px solid #2a2e37;
        }
        .search-container input {
            background: transparent; border: none; color: #fff; width: 100%; outline: none; text-align: right; font-size: 14px;
        }

        /* الفلاتر */
        .filters-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; scrollbar-width: none; }
        .filters-scroll::-webkit-scrollbar { display: none; }
        .f-item {
            background: #252932; padding: 8px 18px; border-radius: 20px;
            font-size: 13px; white-space: nowrap; color: #aaa; border: 1px solid #333;
        }
        .f-item.active { background: #323741; color: #fff; border-color: #555; }

        /* شبكة المعرض */
        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid #222; position: relative; }
        .card img.main { width: 100%; height: 180px; object-fit: cover; display: block; }
        .card-info { padding: 10px; font-size: 12px; background: #16191f; display: flex; justify-content: space-between; align-items: center; }
        
        .thumb-bar { display: flex; gap: 2px; height: 35px; background: #000; border-top: 1px solid #222; }
        .thumb-bar img { width: 25%; height: 100%; object-fit: cover; opacity: 0.5; }

        .hidden { display: none; }
        #lock-screen { text-align: center; padding-top: 80px; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h2 style="color:var(--gold); letter-spacing: 3px;">عينات حسو</h2>
        <div style="background:rgba(255,255,255,0.03); padding:30px; border-radius:25px; margin:30px 0; border: 1px dashed var(--gold);">
            <div id="targetCode" style="font-size:32px; font-weight:bold; letter-spacing:8px; margin-bottom:15px;">1234</div>
            <button onclick="copyCode()" style="background:var(--gold); border:none; padding:10px 25px; border-radius:50px; font-weight:bold; cursor:pointer;">نسخ الرمز</button>
        </div>
        <input type="number" id="passInput" placeholder="أدخل الرمز هنا" style="width:90%; padding:15px; border-radius:15px; border:1px solid #333; background:#1a1d23; color:#fff; text-align:center; font-size:18px;">
        <button onclick="checkPass()" style="width:90%; padding:15px; margin-top:20px; background:linear-gradient(45deg, #c9a050, #f9e29b); border:none; border-radius:15px; font-weight:bold; font-size:18px; color:#000;">الدخول</button>
    </div>

    <div id="content" class="hidden">
        <div class="top-header">
            <a href="https://t.me/xxnnn8" class="contact-btn">
                <span class="online-dot"></span>
                <span>تواصل معنا</span>
                <span class="contact-user">@xxnnn8</span>
            </a>
            <div class="album-title">الألبومات 📂</div>
        </div>

        <div class="search-container">
            <input type="text" placeholder="ابحث عن ألبوم...">
            <span style="opacity:0.5">🔍</span>
        </div>

        <div class="filters-scroll">
            <div class="f-item active">الكل 325</div>
            <div class="f-item">سناب 20</div>
            <div class="f-item">مشهورات 21</div>
            <div class="f-item">سهرات 12</div>
            <div class="f-item">حصري 10</div>
        </div>

        <div class="gallery" id="items-list">
            </div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS4V6swf_1fE33kPaIG6nNS4lbf6Ii87Hxx9hKnR_xDvE4vpbm8SG2ZrPaGoMky5NGpAt-tkNzv7L4j/pub?output=csv";
        let correctPass = "";

        async function init() {
            try {
                const resp = await fetch(CSV_URL);
                const text = await resp.text();
                const rows = text.split('\n').slice(1);
                correctPass = rows[0].split(',')[0].trim();
                document.getElementById('targetCode').innerText = correctPass;

                const list = document.getElementById('items-list');
                rows.forEach(row => {
                    const cols = row.split(',');
                    if(cols[1] && cols[1].trim()) {
                        const imgs = cols[1].split(','); 
                        const main = imgs[0].trim();
                        let thumbs = '';
                        imgs.slice(1, 5).forEach(t => { thumbs += `<img src="${t.trim()}">`; });

                        list.innerHTML += `
                            <div class="card">
                                <img src="${main}" class="main" loading="lazy">
                                <div class="card-info">
                                    <span style="opacity:0.6">🖼️ ${imgs.length}</span>
                                    <span>${cols[2] || 'ألبوم'}</span>
                                </div>
                                <div class="thumb-bar">${thumbs}</div>
                            </div>`;
                    }
                });
            } catch (e) { console.error("Error"); }
        }

        function checkPass() {
            if(document.getElementById('passInput').value === correctPass) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('content').classList.remove('hidden');
                window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            } else { alert("الرمز غير صحيح"); }
        }

        function copyCode() {
            navigator.clipboard.writeText(document.getElementById('targetCode').innerText);
            window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
            alert("تم نسخ الرمز");
        }

        init();
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
