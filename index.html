<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>حصريات حسو</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222222;
    --yellow: #f5c518;
    --white: #ffffff;
    --gray: #888888;
    --danger: #e04444;
    --green: #2ecc71;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--white); min-height: 100vh; overflow-x: hidden; }

  /* الشاشة الرئيسية للدخول */
  #passcode-screen {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px 20px;
    background: radial-gradient(ellipse at top, #1a1500 0%, var(--bg) 60%);
  }

  .logo-area { text-align: center; margin-bottom: 20px; }
  .logo-icon { font-size: 50px; margin-bottom: 10px; }
  .logo-title { font-size: 28px; font-weight: 900; color: var(--yellow); }

  /* مربع النسخ */
  .copy-box {
    width: 100%; max-width: 350px; background: var(--surface2);
    border: 2px dashed var(--yellow); border-radius: 15px;
    padding: 15px; margin-bottom: 15px; text-align: center; cursor: pointer;
  }
  .copy-box span { display: block; font-size: 12px; color: var(--gray); }
  .copy-box strong { font-size: 24px; color: #fff; }

  /* زر التواصل الأخضر */
  .contact-btn {
    width: 100%; max-width: 350px; background: var(--green);
    color: #000; text-decoration: none; padding: 12px;
    border-radius: 12px; font-weight: 700; display: flex;
    align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px;
  }

  .code-card { width: 100%; max-width: 350px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 20px; padding: 20px; }
  .code-input { width: 100%; background: var(--surface2); border: 2px solid var(--border); border-radius: 10px; padding: 12px; font-size: 20px; color: var(--yellow); text-align: center; margin-bottom: 10px; outline: none; }
  .btn-enter { width: 100%; background: var(--yellow); border: none; border-radius: 10px; padding: 14px; font-weight: 900; cursor: pointer; }

  /* واجهة المقاطع */
  #main-screen { display: none; flex-direction: column; min-height: 100vh; }
  .app-header { background: var(--surface); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  
  .clips-grid { padding: 15px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .clip-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; }
  .clip-card:hover { border-color: var(--yellow); }

  /* المودال (النافذة المنبثقة) */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  .modal { background: var(--surface); padding: 25px; border-radius: 20px; width: 100%; max-width: 350px; text-align: center; }
  .modal-btn { display: block; background: #229ED9; color: white; padding: 14px; border-radius: 10px; text-decoration: none; margin-top: 20px; font-weight: 700; }
</style>
</head>
<body>

<div id="passcode-screen">
  <div class="logo-area">
    <div class="logo-icon">👑</div>
    <div class="logo-title">حصريات حسو</div>
  </div>

  <div class="copy-box" onclick="copyOnlyCode()">
    <span>إضغط هنا لنسخ الرمز</span>
    <strong id="the-code">1234</strong>
  </div>

  <a href="https://t.me/xxnnn8" class="contact-btn" target="_blank">
    <span>🟢</span> للتواصل معنا @xxnnn8
  </a>

  <div class="code-card">
    <input type="text" id="code-input" class="code-input" placeholder="ألصق الرمز هنا">
    <button class="btn-enter" onclick="checkCode()">دخول</button>
    <div id="error-msg" style="color:var(--danger); text-align:center; margin-top:10px; font-size:12px;"></div>
  </div>
</div>

<div id="main-screen">
  <div class="app-header">
    <button onclick="logout()" style="background:none; border:none; color:var(--gray); font-family:'Cairo';">خروج ⇤</button>
    <div style="color:var(--yellow); font-weight:900;">حصريات حسو</div>
    <div style="width:40px;"></div>
  </div>
  <div class="clips-grid" id="clips-grid"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="m-title" style="color:var(--yellow); margin-bottom:10px;"></h3>
    <p style="font-size:13px; color:var(--gray);">سيتم توجيهك الآن لمشاهدة المقطع</p>
    <a href="#" id="m-link" class="modal-btn" target="_blank">مشاهدة المقطع الآن</a>
    <button onclick="closeModal()" style="background:none; border:none; color:var(--gray); margin-top:15px; cursor:pointer; font-family:'Cairo';">إلغاء</button>
  </div>
</div>

<script>
  const CORRECT_CODE = "1234";
  // ضع رابط الـ API الخاص بجوجل شيت هنا
  const SHEET_URL = "https://script.google.com/macros/s/AKfycbwTQdhpGV1w8s8TJ9T490DeVnUEK-nE_pII8d6I4oz19ZS5izxxmumq2q6piKmrCnhV/exec";

  let clipsData = [];

  // دالة نسخ الرمز فقط بدون نصوص
  function copyOnlyCode() {
    const code = document.getElementById('the-code').innerText;
    navigator.clipboard.writeText(code).then(() => {
      alert("تم نسخ الرمز: " + code);
    });
  }

  function checkCode() {
    const val = document.getElementById('code-input').value.trim();
    if (val === CORRECT_CODE) {
      sessionStorage.setItem('huso_auth', 'true');
      showApp();
    } else {
      document.getElementById('error-msg').textContent = "الرمز غير صحيح!";
    }
  }

  function showApp() {
    document.getElementById('passcode-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'flex';
    loadData();
  }

  async function loadData() {
    const grid = document.getElementById('clips-grid');
    grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px;">جاري جلب الحصريات...</div>';
    
    try {
      const res = await fetch(SHEET_URL);
      const data = await res.json();
      const rows = Array.isArray(data) ? data : (data.data || []);
      
      // هنا الكود يقرأ العمود الأول للاسم والثاني للرابط
      clipsData = rows.map(r => ({
        name: r.name || r[0] || "مقطع جديد",
        link: r.link || r[1] || "#"
      }));

      render();
    } catch (e) {
      grid.innerHTML = '<div style="grid-column:1/-1; text-align:center;">تأكد من اتصال الإنترنت أو رابط الشيت</div>';
    }
  }

  function render() {
    const grid = document.getElementById('clips-grid');
    if (clipsData.length === 0) {
      grid.innerHTML = '<div style="grid-column:1/-1; text-align:center;">لا توجد مقاطع مضافة</div>';
      return;
    }
    grid.innerHTML = clipsData.map((clip, i) => `
      <div class="clip-card" onclick="openModal(${i})">
        <div style="font-size:30px; margin-bottom:5px;">🎥</div>
        <div style="font-size:13px; font-weight:700;">${clip.name}</div>
      </div>
    `).join('');
  }

  function openModal(i) {
    document.getElementById('m-title').textContent = clipsData[i].name;
    document.getElementById('m-link').href = clipsData[i].link;
    document.getElementById('modal').style.display = 'flex';
  }

  function closeModal() { document.getElementById('modal').style.display = 'none'; }

  function logout() {
    sessionStorage.removeItem('huso_auth');
    location.reload();
  }

  if (sessionStorage.getItem('huso_auth') === 'true') showApp();
</script>

</body>
</html>
