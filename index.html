<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>عينات حسو</title>

<style>
body{
 margin:0;
 font-family:system-ui;
 background:#000;
 color:#fff;
}

/* LOGIN */
.login{
 height:100vh;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 background:radial-gradient(circle,#111,#000);
 text-align:center;
}

h1{
 background:linear-gradient(90deg,gold,orange);
 -webkit-background-clip:text;
 color:transparent;
}

/* INPUT */
input{
 padding:12px;
 border-radius:10px;
 border:none;
 width:220px;
 text-align:center;
 margin-top:8px;
}

/* BUTTON */
button{
 margin-top:10px;
 padding:10px 20px;
 background:gold;
 border:none;
 border-radius:10px;
 cursor:pointer;
 font-weight:bold;
}

/* COPY BOX */
.copyBox{
 display:flex;
 gap:10px;
 align-items:center;
 justify-content:center;
 margin-top:10px;
}

.copyBox input{
 width:90px;
 background:#222;
 color:#fff;
}

/* GRID */
.grid{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;
 padding:10px;
}

@media(min-width:700px){
 .grid{grid-template-columns:repeat(4,1fr);}
}

/* CARD */
.card{
 background:#111;
 border-radius:15px;
 overflow:hidden;
 cursor:pointer;
 border:1px solid #222;
 transition:.3s;
}

.card:hover{
 transform:scale(1.05);
 border-color:gold;
}

.card img{
 width:100%;
 height:150px;
 object-fit:cover;
}

/* VIEW */
.viewer{
 padding:10px;
}

.media img,.media video{
 width:100%;
 border-radius:10px;
 margin-top:10px;
}

/* BACK */
.back{
 padding:8px;
 background:#222;
 border-radius:10px;
 display:inline-block;
 cursor:pointer;
 margin-bottom:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
  <h1>اهلا بك في عالم حسو</h1>

  <p>انسخ الرمز او الصقه للدخول</p>

  <!-- COPY PIN -->
  <div class="copyBox">
    <input id="pinText" value="1234" readonly>
    <button onclick="copyPin()">📋 نسخ</button>
  </div>

  <!-- INPUT -->
  <input id="pin" placeholder="ادخل الرمز">
  <button onclick="login()">دخول</button>

  <p style="position:absolute;bottom:10px">@xxnnn8</p>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div style="padding:10px;background:#111;display:flex;justify-content:space-between">
  <div>🎬 عينات حسو</div>
  <div style="color:#0f0">● Online</div>
</div>

<div id="albums" class="grid"></div>
<div id="viewer"></div>

</div>

<script>

let cache=[];

/* COPY PIN */
function copyPin(){
  let pin = document.getElementById("pinText").value;

  navigator.clipboard.writeText(pin).then(()=>{
    alert("تم نسخ الرمز");
  }).catch(()=>{
    alert("فشل النسخ");
  });
}

/* LOGIN */
function login(){
 let pin=document.getElementById("pin").value;

 google.script.run
  .withSuccessHandler(res=>{
    if(res){
      document.getElementById("login").style.display="none";
      document.getElementById("app").style.display="block";
      loadAlbums();
    } else {
      alert("رمز خطأ");
    }
  })
  .withFailureHandler(err=>{
    alert("خطأ اتصال بالسيرفر");
    console.log(err);
  })
  .auth(pin);
}

/* LOAD ALBUMS */
function loadAlbums(){

 if(cache.length){
  render(cache);
  return;
 }

 google.script.run.withSuccessHandler(data=>{
  cache=data;
  render(data);
 }).getAlbums();
}

/* RENDER */
function render(data){
 let box=document.getElementById("albums");
 box.innerHTML="";

 data.forEach(a=>{
  let div=document.createElement("div");
  div.className="card";
  div.innerHTML=`
    <img src="${a.cover}">
    <div style="padding:8px">${a.title}</div>
  `;
  div.onclick=()=>openAlbum(a.id,a.title);
  box.appendChild(div);
 });
}

/* OPEN ALBUM */
function openAlbum(id,title){

 google.script.run.withSuccessHandler(items=>{

  document.getElementById("albums").style.display="none";

  let v=document.getElementById("viewer");

  v.innerHTML=`<div class="back" onclick="back()">⬅ رجوع</div><h3>${title}</h3>`;

  items.forEach(i=>{
   let media=i.type==="image"
    ? `<img src="${i.url}">`
    : `<video controls src="${i.url}"></video>`;

   v.innerHTML+=`
    <div class="media">
      <div>${i.title}</div>
      ${media}
    </div>
   `;
  });

 }).getItems(id);
}

/* BACK */
function back(){
 document.getElementById("viewer").innerHTML="";
 document.getElementById("albums").style.display="grid";
}

</script>

</body>
</html>
