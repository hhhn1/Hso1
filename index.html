
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عينات حسو VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* التنسيق الأساسي للمتغيرات */
        :root {
            --gold: #c9a050;
            --bg: #ffffff;
            --text: #000000;
            --input-bg: rgba(0,0,0,0.05);
            --card-bg: #f5f5f5;
        }

        /* تحويل الألوان تلقائياً في الليل */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --text: #ffffff;
                --input-bg: rgba(255,255,255,0.05);
                --card-bg: #1a1d23;
            }
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: background 0.5s; }

        /* شاشة القفل الفخمة */
        #lock-screen {
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            background: linear-gradient(135deg, var(--bg) 0%, var(--input-bg) 100%);
            transition: opacity 0.6s ease;
        }

        .main-title { font-size: 38px; font-weight: 900; color: var(--gold); margin: 0; }
        .divider { width: 60px; height: 3px; background: var(--gold); margin: 15px auto; border-radius: 10px; }

        .btn-copy { 
            background: transparent; color: var(--gold); border: 1px solid var(--gold); 
            padding: 8px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-bottom: 25px;
        }

        .input-vip { 
            width: 80%; padding: 18px; border-radius: 20px; border: 1px solid var(--input-bg); 
            background: var(--input-bg); color: var(--text); text-align: center; 
            font-size: 22px; margin-bottom: 20px; outline: none;
        }

        .btn-enter { 
            width: 80%; padding: 18px; border-radius: 20px; border: none; 
            background: var(--gold); color: #000; font-weight: 900; font-size: 18px; cursor: pointer;
        }

        /* واجهة المحتوى */
        #content { display: none; opacity: 0; padding: 15px; background: var(--bg); min-height: 100vh; }
        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid var(--input-bg); }
        .media-box { width: 100%; height: 180px; background: #000; }
        .media-box img, .media-box video { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 10px; text-align: right; }
        .card-title { font-size: 11px; font-weight: bold; }

        /* عارض الصور المباشر */
        #viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: none; flex-direction: column; overflow-y: auto; }
        .viewer-item { width: 100%; margin-bottom: 5px; }
        .viewer-item img, .viewer-item video { width: 100%; display: block; }
        .close-btn { position: sticky; top: 10px; right: 10px; z-index: 10001; background: var(--gold); border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h1 class="main-title">عينات حسو</h1>
        <div class="divider"></div>
        <p style="opacity: 0.7; font-size: 14px;">نظام الوصول الملكي</p>
        
        <div id="targetCode" style="font-size:32px; font-weight:900; margin: 10px 0; color: var(--gold);">1234</div>
        <button class="btn-copy" onclick="copyCode()">نسخ الرمز</button>

        <input type="number" id="passInput" class="input-vip" placeholder="ادخل الرمز">
        <button class="btn-enter" onclick="checkPass()">دخول</button>
    </div>

    <div id="content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
             <div style="font-weight: 900; font-size: 20px;">📂 الألبومات</div>
             <div style="color:var(--gold); font-size: 12px;">@xxnnn8</div>
        </div>
        <div id="items-list" class="gallery"></div>
    </div>

    <div id="viewer">
        <button class="close-btn" onclick="closeViewer()">رجوع</button>
        <div id="viewer-content"></div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS4V6swf_1fE33kPaIG6nNS4lbf6Ii87Hxx9hKnR_xDvE4vpbm8SG2ZrPaGoMky5NGpAt-tkNzv7L4j/pub?output=csv";
        let correctPass = "";

        async function init() {
            try {
                const resp = await fetch(CSV_URL);
                const text = await resp.text();
                const rows = text.split('\n').slice(1);
                correctPass = rows[0].split(',')[0].trim();
                document.getElementById('targetCode').innerText = correctPass;

                const list = document.getElementById('items-list');
                rows.forEach(row => {
                    const cols = row.split(',');
                    if(cols[1] && cols[1].trim()) {
                        const urls = cols[1].split(',').map(u => u.trim()).filter(u => u !== "");
                        const firstUrl = urls[0];
                        const isVid = firstUrl.toLowerCase().endsWith('.mp4');
                        list.innerHTML += `
                            <div class="card" onclick='openViewer(${JSON.stringify(urls)})'>
                                <div class="media-box">
                                    ${isVid ? `<video muted loop playsinline><source src="${firstUrl}" type="video/mp4"></video>` : `<img src="${firstUrl}" loading="lazy">`}
                                </div>
                                <div class="card-info"><div class="card-title">${cols[2] || 'ألبوم حصري'}</div></div>
                            </div>`;
                    }
                });
            } catch (e) {}
        }

        function checkPass() {
            if(document.getElementById('passInput').value === correctPass) {
                document.getElementById('lock-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('lock-screen').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                    setTimeout(() => document.getElementById('content').style.opacity = '1', 50);
                }, 600);
            } else { alert("الرمز خطأ"); }
        }

        function openViewer(urls) {
            const cont = document.getElementById('viewer-content');
            cont.innerHTML = '';
            urls.forEach(u => {
                const isV = u.toLowerCase().endsWith('.mp4');
                cont.innerHTML += `<div class="viewer-item">${isV ? `<video controls autoplay loop muted><source src="${u}" type="video/mp4"></video>` : `<img src="${u}">`}</div>`;
            });
            document.getElementById('viewer').style.display = 'block';
        }

        function closeViewer() { document.getElementById('viewer').style.display = 'none'; }
        function copyCode() { navigator.clipboard.writeText(correctPass); alert("تم النسخ"); }

        init();
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
