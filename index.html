<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>حصريات حسو</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222222;
    --yellow: #f5c518;
    --white: #ffffff;
    --gray: #888888;
    --danger: #e04444;
    --green: #2ecc71;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--white); min-height: 100vh; overflow-x: hidden; }

  #passcode-screen {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px 20px;
    background: radial-gradient(ellipse at top, #1a1500 0%, var(--bg) 60%);
  }

  .logo-area { text-align: center; margin-bottom: 20px; }
  .logo-icon { font-size: 50px; margin-bottom: 10px; }
  .logo-title { font-size: 28px; font-weight: 900; color: var(--yellow); }

  .copy-box {
    width: 100%; max-width: 350px; background: var(--surface2);
    border: 2px dashed var(--yellow); border-radius: 15px;
    padding: 15px; margin-bottom: 15px; text-align: center; cursor: pointer;
  }
  .copy-box span { display: block; font-size: 12px; color: var(--gray); }
  .copy-box strong { font-size: 24px; color: #fff; }

  .contact-btn {
    width: 100%; max-width: 350px; background: var(--green);
    color: #000; text-decoration: none; padding: 12px;
    border-radius: 12px; font-weight: 700; display: flex;
    align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px;
  }

  .code-card { width: 100%; max-width: 350px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 20px; padding: 20px; }
  .code-input { width: 100%; background: var(--surface2); border: 2px solid var(--border); border-radius: 10px; padding: 12px; font-size: 20px; color: var(--yellow); text-align: center; margin-bottom: 10px; outline: none; }
  .btn-enter { width: 100%; background: var(--yellow); border: none; border-radius: 10px; padding: 14px; font-weight: 900; cursor: pointer; }

  #main-screen { display: none; flex-direction: column; min-height: 100vh; }
  .app-header { background: var(--surface); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  
  /* 🔍 شريط البحث */
  .search-box {
    padding: 12px; background: var(--surface); border-bottom: 1px solid var(--border);
  }
  .search-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 15px; font-size: 14px;
    color: var(--white); font-family: 'Cairo'; outline: none;
  }
  .search-input::placeholder { color: var(--gray); }
  
  /* 📊 شريط الإحصائيات */
  .stats-bar {
    padding: 8px 12px; background: var(--surface2); border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-around; flex-wrap: wrap; gap: 8px;
  }
  .stat-item {
    display: flex; align-items: center; gap: 5px; font-size: 12px;
    background: var(--surface); padding: 5px 10px; border-radius: 20px;
  }
  
  .grid { padding: 12px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  
  .item {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; cursor: pointer; transition: all 0.15s; position: relative;
  }
  .item:active { transform: scale(0.95); background: #222; }
  
  .item img { width: 100%; height: 120px; object-fit: cover; background: #000; }
  
  .item-info { padding: 8px; }
  .item-title { display: block; font-size: 13px; font-weight: 700; text-align: center; margin-bottom: 5px; }
  
  /* 👁️ عداد المشاهدات + 📤 مشاركة */
  .item-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 8px; border-top: 1px solid var(--border);
  }
  .views-count { font-size: 11px; color: var(--gray); display: flex; align-items: center; gap: 3px; }
  .share-btn {
    background: none; border: none; color: var(--yellow); font-size: 14px;
    cursor: pointer; padding: 3px 5px;
  }
  .share-btn:active { opacity: 0.7; }
  
  .album-badge { background: var(--yellow); color: #000; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-right: 5px; }
  .new-badge { background: var(--danger); color: white; font-size: 9px; padding: 2px 5px; border-radius: 4px; margin-right: 5px; }

  .btn-paste {
    background: none; border: 1px solid var(--border); color: var(--gray);
    padding: 8px 12px; border-radius: 8px; margin-bottom: 8px; font-size: 12px;
    cursor: pointer;
  }
  
  .top-contact {
    background: #000; color: var(--yellow); padding: 8px; text-align: center;
    border-bottom: 1px solid var(--border); font-weight: bold;
  }
  .top-contact a { color: var(--yellow); text-decoration: none; }

  .video-modal {
    position: fixed; inset: 0; background: #000; z-index: 9999;
    display: none; align-items: center; justify-content: center;
  }
  .video-modal video { width: 100%; height: 100%; object-fit: contain; }
  .close-video {
    position: absolute; top: 15px; left: 15px; color: white;
    background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 20px;
    cursor: pointer; font-size: 14px; z-index: 10;
  }

  .album-modal {
    position: fixed; inset: 0; background: #0a0a0a; z-index: 9999;
    display: none; flex-direction: column; overflow-y: auto;
  }
  .album-header {
    background: var(--surface); padding: 15px; display: flex;
    justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .album-content { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .album-video { width: 100%; border-radius: 10px; background: #000; }
  .album-img { width: 100%; border-radius: 10px; cursor: pointer; }
  
  .no-results {
    grid-column: 1/-1; text-align: center; padding: 30px; color: var(--gray);
  }
</style>
</head>
<body>

<div id="passcode-screen">
  <div class="logo-area">
    <div class="logo-icon">👑</div>
    <div class="logo-title">حصريات حسو</div>
  </div>

  <div class="copy-box" onclick="copyOnlyCode()">
    <span>إضغط هنا لنسخ الرمز</span>
    <strong id="the-code">1234</strong>
  </div>

  <a href="https://t.me/xxnnn8" class="contact-btn" target="_blank">
    <span>🟢</span> للتواصل معنا @xxnnn8
  </a>

  <div class="code-card">
    <button class="btn-paste" onclick="pasteCode()">📋 لصق الرمز</button>
    <input type="text" id="code-input" class="code-input" placeholder="ألصق الرمز هنا">
    <button class="btn-enter" onclick="checkCode()">دخول</button>
    <div id="error-msg" style="color:var(--danger); text-align:center; margin-top:10px; font-size:12px;"></div>
  </div>
</div>

<div id="main-screen">
  <div class="top-contact">
    للتواصل معنا <a href="https://t.me/xxnnn8" target="_blank">@xxnnn8</a> 👑
  </div>
  <div class="app-header">
    <button onclick="logout()" style="background:none; border:none; color:var(--gray); font-family:'Cairo';">خروج ⇤</button>
    <div style="color:var(--yellow); font-weight:900;">حصريات حسو</div>
    <div style="width:40px;"></div>
  </div>
  
  <!-- 🔍 شريط البحث -->
  <div class="search-box">
    <input type="text" id="searchInput" class="search-input" placeholder="🔍 بحث عن مقطع..." oninput="filterItems()">
  </div>
  
  <!-- 📊 شريط الإحصائيات -->
  <div class="stats-bar" id="statsBar">
    <span class="stat-item">📊 <span id="totalCount">0</span> الكل</span>
    <span class="stat-item">🎥 <span id="videoCount">0</span> فيديو</span>
    <span class="stat-item">🖼️ <span id="imageCount">0</span> صورة</span>
    <span class="stat-item">📁 <span id="albumCount">0</span> ألبوم</span>
  </div>
  
  <div class="grid" id="grid"></div>
</div>

<div class="video-modal" id="videoModal" onclick="closeVideo()">
  <span class="close-video">إغلاق ✕</span>
  <video id="player" controls autoplay playsinline></video>
</div>

<div class="album-modal" id="albumModal">
  <div class="album-header">
    <button onclick="closeAlbum()" style="background:none; border:none; color:var(--gray); font-family:'Cairo';">✕ إغلاق</button>
    <div style="color:var(--yellow); font-weight:900;" id="albumTitle">الألبوم</div>
    <div style="width:40px;"></div>
  </div>
  <div class="album-content" id="albumContent"></div>
</div>

<script>
  const CORRECT_CODE = "1234";
  const API = "https://script.google.com/macros/s/AKfycbzyZ0Lsjqz9p39DsoJ2nCeReMU9sx6es_bONa0bJ26mXVHo3CorpZ8gbPd4TH_SRJQr/exec";

  let dataList = [];
  let filteredList = [];
  let viewsData = JSON.parse(localStorage.getItem('clip_views') || '{}');

  function copyOnlyCode() {
    const code = document.getElementById('the-code').innerText;
    navigator.clipboard.writeText(code).then(() => {
      alert("تم نسخ الرمز: " + code);
    }).catch(() => {
      prompt("انسخ الرمز يدوياً:", code);
    });
  }

  async function pasteCode() {
    try {
      const text = await navigator.clipboard.readText();
      document.getElementById('code-input').value = text;
    } catch (err) {
      alert("تعذر اللصق تلقائياً، ألصقه يدوياً من فضلك.");
    }
  }

  function checkCode() {
    const val = document.getElementById('code-input').value.trim();
    if (val === CORRECT_CODE) {
      sessionStorage.setItem('huso_auth', 'true');
      showApp();
    } else {
      document.getElementById('error-msg').textContent = "الرمز غير صحيح!";
    }
  }

  function showApp() {
    document.getElementById('passcode-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'flex';
    loadData();
  }

  async function loadData() {
    try {
      const res = await fetch(API + '?t=' + new Date().getTime());
      const data = await res.json();
      
      let rows = Array.isArray(data) ? data : (data.data || []);

      dataList = rows.map((r, i) => {
        let raw = r.video || r[1] || "";
        let isAlbum = raw.includes("-");
        let isVideo = !isAlbum && (raw.endsWith('.mp4') || raw.endsWith('.mov'));
        let isImage = !isAlbum && (raw.endsWith('.jpg') || raw.endsWith('.png') || raw.endsWith('.jpeg'));
        
        return {
          id: 'clip_' + i,
          name: r.name || r[0] || "مقطع " + (i + 1),
          video: raw,
          thumb: r.thumb || r[2] || "",
          isAlbum: isAlbum,
          isVideo: isVideo,
          isImage: isImage,
          views: viewsData['clip_' + i] || 0
        };
      }).filter(x => x.video);

      filteredList = [...dataList];
      render();
      updateStats();
    } catch (e) {
      console.error(e);
      document.getElementById('grid').innerHTML = '<div class="no-results">❌ فشل التحميل</div>';
    }
  }

  function updateStats() {
    const total = dataList.length;
    const videos = dataList.filter(d => d.isVideo).length;
    const images = dataList.filter(d => d.isImage).length;
    const albums = dataList.filter(d => d.isAlbum).length;
    
    document.getElementById('totalCount').textContent = total;
    document.getElementById('videoCount').textContent = videos;
    document.getElementById('imageCount').textContent = images;
    document.getElementById('albumCount').textContent = albums;
  }

  function filterItems() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    
    if (searchTerm === '') {
      filteredList = [...dataList];
    } else {
      filteredList = dataList.filter(item => 
        item.name.toLowerCase().includes(searchTerm)
      );
    }
    
    render();
  }

  function render() {
    let grid = document.getElementById("grid");
    
    if (filteredList.length === 0) {
      grid.innerHTML = '<div class="no-results">🔍 لا توجد نتائج للبحث</div>';
      return;
    }

    grid.innerHTML = filteredList.map((item, idx) => {
      const originalIndex = dataList.findIndex(d => d.id === item.id);
      
      return `
        <div class="item" onclick="openItem(${originalIndex})">
          ${item.thumb ? `<img src="${item.thumb}">` : `<img src="https://via.placeholder.com/300x200/1a1a1a/f5c518?text=🎬">`}
          <div class="item-info">
            <span class="item-title">
              ${item.isAlbum ? '<span class="album-badge">📁 ألبوم</span>' : ''}
              ${item.name}
            </span>
          </div>
          <div class="item-footer">
            <span class="views-count">👁️ ${item.views}</span>
            <button class="share-btn" onclick="event.stopPropagation(); shareItem('${item.id}')" title="مشاركة">📤</button>
          </div>
        </div>
      `;
    }).join("");
  }

  function addView(itemId) {
    viewsData[itemId] = (viewsData[itemId] || 0) + 1;
    localStorage.setItem('clip_views', JSON.stringify(viewsData));
    
    const item = dataList.find(d => d.id === itemId);
    if (item) item.views = viewsData[itemId];
    render();
  }

  function shareItem(itemId) {
    const item = dataList.find(d => d.id === itemId);
    if (!item) return;
    
    const shareText = `🎬 ${item.name}\n\nلمشاهدة المزيد تابعنا على تيليجرام:\n@xxnnn8 👑`;
    
    if (navigator.share) {
      navigator.share({
        title: item.name,
        text: shareText,
      }).catch(() => {});
    } else {
      navigator.clipboard.writeText(shareText).then(() => {
        alert('تم نسخ معلومات المقطع مع حقوق @xxnnn8');
      });
    }
  }

  function openItem(i) {
    let item = dataList[i];
    addView(item.id);

    // 📁 ألبوم
    if (item.isAlbum) {
      let vids = item.video.split("-").filter(v => v.trim());
      document.getElementById('albumTitle').textContent = item.name;
      
      let content = document.getElementById('albumContent');
      content.innerHTML = vids.map(v => {
        let trimmed = v.trim();
        let isVideo = trimmed.endsWith('.mp4') || trimmed.endsWith('.mov');
        if (isVideo) {
          return `<video src="${trimmed}" controls class="album-video" playsinline></video>`;
        } else {
          return `<img src="${trimmed}" class="album-img" onclick="showImage('${trimmed}')">`;
        }
      }).join('');
      
      document.getElementById('albumModal').style.display = 'flex';
      return;
    }

    // 🖼️ صورة
    if (item.isImage) {
      showImage(item.video);
      return;
    }

    // 🎥 فيديو
    let modal = document.getElementById("videoModal");
    let player = document.getElementById("player");
    player.src = item.video;
    modal.style.display = "flex";
  }

  function showImage(src) {
    const modal = document.createElement('div');
    modal.style.cssText = 'position:fixed; inset:0; background:#000; z-index:99999; display:flex; align-items:center; justify-content:center;';
    modal.innerHTML = `<img src="${src}" style="max-width:100%; max-height:100%; object-fit:contain;" onclick="this.parentElement.remove()">`;
    document.body.appendChild(modal);
    modal.onclick = () => modal.remove();
  }

  function closeVideo() {
    let modal = document.getElementById("videoModal");
    let player = document.getElementById("player");
    player.pause();
    player.src = "";
    modal.style.display = "none";
  }

  function closeAlbum() {
    document.getElementById('albumModal').style.display = 'none';
    document.getElementById('albumContent').innerHTML = '';
  }

  function logout() {
    sessionStorage.removeItem('huso_auth');
    location.reload();
  }

  let touchStartY = 0;
  document.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, {passive: true});
  document.addEventListener('touchmove', e => {
    if (window.scrollY === 0 && e.touches[0].clientY - touchStartY > 70) {
      if (document.getElementById('main-screen').style.display === 'flex') {
        loadData();
      }
    }
  }, {passive: true});

  if (sessionStorage.getItem('huso_auth') === 'true') showApp();
</script>
</body>
</html>
