<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عينات حسو - VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #c9a050; --bg: #000; }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff;
            margin: 0; padding: 20px; overflow-x: hidden; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        /* خلفية النجوم المتحركة */
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        .content-wrapper { position: relative; z-index: 2; width: 100%; max-width: 420px; text-align: center; }

        h2 { font-weight: 200; letter-spacing: 5px; color: var(--gold); margin-top: 50px; text-transform: uppercase; }
        .divider { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 20px auto; }

        /* صندوق الرمز الاحترافي */
        .glass-box {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 25px;
            padding: 30px 20px; margin-bottom: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .code-display { font-size: 32px; font-weight: bold; color: #fff; margin-bottom: 15px; letter-spacing: 5px; text-shadow: 0 0 10px var(--gold); }
        .btn-copy { 
            background: var(--gold); color: #000; border: none; padding: 10px 25px; 
            border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        .input-vip {
            background: rgba(0,0,0,0.6); border: 1px solid #222; width: 100%;
            padding: 15px; border-radius: 15px; color: #fff; font-size: 20px;
            text-align: center; margin-bottom: 20px; outline: none;
        }
        .btn-enter {
            background: linear-gradient(45deg, #8a6d3b, #c9a050, #e6be8a);
            width: 100%; padding: 16px; border-radius: 15px; border: none;
            color: #000; font-weight: 900; letter-spacing: 1px; cursor: pointer;
            font-size: 18px;
        }

        /* معرض الصور الفخم */
        .premium-card {
            width: 100%; border-radius: 20px; overflow: hidden; margin-bottom: 30px;
            background: #0a0a0a; border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: translateY(20px); opacity: 0;
            animation: slideIn 0.6s forwards;
        }
        @keyframes slideIn { to { transform: translateY(0); opacity: 1; } }
        .premium-card img { width: 100%; display: block; filter: brightness(0.85); transition: 0.5s; }
        .premium-card:hover img { filter: brightness(1.1); }
        .card-desc { padding: 15px; text-align: right; background: rgba(10,10,10,0.9); font-size: 14px; color: #aaa; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div id="lock-screen" class="content-wrapper">
        <h2>عينات حسو</h2>
        <div class="divider"></div>
        
        <div class="glass-box">
            <div class="code-display" id="targetCode">1234</div>
            <button class="btn-copy" onclick="copyCode()">اضغط للنسخ</button>
        </div>

        <input type="number" id="passInput" class="input-vip" placeholder="أدخل الرمز الملكي">
        <button class="btn-enter" onclick="checkPass()">الدخول</button>
    </div>

    <div id="content" class="content-wrapper hidden">
        <h2>المعرض الملكي</h2>
        <div class="divider" style="width: 150px;"></div>
        <div id="items-list"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // برمجة النماذج المتحركة (الخلفية)
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80 },
                "color": { "value": "#c9a050" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5 },
                "size": { "value": 2 },
                "line_linked": { "enable": true, "distance": 150, "color": "#c9a050", "opacity": 0.2, "width": 1 },
                "move": { "enable": true, "speed": 2 }
            }
        });

        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS4V6swf_1fE33kPaIG6nNS4lbf6Ii87Hxx9hKnR_xDvE4vpbm8SG2ZrPaGoMky5NGpAt-tkNzv7L4j/pub?output=csv";
        let correctPass = "";

        async function init() {
            try {
                const resp = await fetch(CSV_URL);
                const text = await resp.text();
                const rows = text.split('\n').slice(1);
                correctPass = rows[0].split(',')[0].trim();
                document.getElementById('targetCode').innerText = correctPass;

                const list = document.getElementById('items-list');
                rows.forEach((row, i) => {
                    const cols = row.split(',');
                    if(cols[1] && cols[1].trim().startsWith('http')) {
                        const card = `<div class="premium-card" style="animation-delay: ${i*0.2}s">
                            <img src="${cols[1].trim()}">
                            <div class="card-desc">${cols[2] || ''}</div>
                        </div>`;
                        list.innerHTML += card;
                    }
                });
            } catch (e) { console.error("Error loading data"); }
        }

        function copyCode() {
            const code = document.getElementById('targetCode').innerText;
            navigator.clipboard.writeText(code);
            window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
            alert("تم نسخ الرمز بنجاح: " + code);
        }

        function checkPass() {
            if(document.getElementById('passInput').value === correctPass) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('content').classList.remove('hidden');
                window.Telegram.WebApp.HapticFeedback.impactOccurred('heavy');
            } else { 
                alert("الرمز غير صحيح"); 
            }
        }

        init();
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
        window.Telegram.WebApp.headerColor = "#000000";
    </script>
</body>
</html>
