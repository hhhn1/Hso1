<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@xxnnn8 😎 | لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #F5C842; --dark: #0d0f18; --card: #1e2235; --text: #f0f0f5; }
        body { background: var(--dark); font-family: 'Cairo', sans-serif; color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { text-align: center; color: var(--gold); margin-bottom: 20px; }
        .input-group { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid rgba(245,200,66,0.2); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #1a1d2e; color: #fff; font-family: 'Cairo'; }
        button { width: 100%; padding: 12px; background: var(--gold); border: none; border-radius: 8px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        .status { text-align: center; margin-top: 15px; font-size: 14px; color: var(--gold); display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>إضافة ألبوم جديد 📤</h2>
    <div class="input-group">
        <input type="text" id="title" placeholder="عنوان الألبوم (مثلاً: لقطة PUBG)">
        <input type="text" id="url" placeholder="الرابط المباشر (Top4Top أو ImgBB)">
        <button id="sendBtn">نشر في الموقع</button>
    </div>
    <div id="status" class="status">جاري النشر... انتظر ثواني ⏳</div>
</div>

<script>
    // الـ ID الجديد مالتك
    const scriptID = "AKfycbwx5xGyr6NkwE1FQk3swohXDL_kYvqEljHFFofj7abg3JLzpOWj5NUW8cBZDAFwCytv";
    const webAppUrl = `https://script.google.com/macros/s/${scriptID}/exec`;

    document.getElementById('sendBtn').onclick = async function() {
        const title = document.getElementById('title').value;
        const url = document.getElementById('url').value;
        const status = document.getElementById('status');

        if (!title || !url) {
            alert("يا بطل املأ الحقول أولاً!");
            return;
        }

        status.style.display = "block";
        status.innerText = "جاري الحفظ في Google Sheets...";

        try {
            // إرسال البيانات للسكريبت
            await fetch(webAppUrl, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ title: title, url: url })
            });

            status.innerText = "✅ تم النشر بنجاح! اذهب لموقعك وشوف النتيجة.";
            document.getElementById('title').value = "";
            document.getElementById('url').value = "";
        } catch (e) {
            status.innerText = "❌ حدث خطأ، تأكد من إعدادات النشر (Anyone).";
        }
    };
</script>

</body>
</html>
