<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عينات حسو - Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #c9a050; --bg: #050505; }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg); color: #fff; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        
        .container { width: 100%; max-width: 420px; text-align: center; }
        
        h2 { font-weight: 300; letter-spacing: 2px; color: var(--gold); margin-top: 50px; }
        .divider { width: 50px; height: 1px; background: var(--gold); margin: 15px auto; opacity: 0.6; }

        /* صندوق الرمز المخصص */
        .copy-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed var(--gold);
            border-radius: 15px; padding: 20px; margin-bottom: 25px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .code-text { font-size: 24px; font-weight: bold; color: #fff; letter-spacing: 3px; }
        .copy-btn {
            background: var(--gold); color: #000; border: none; padding: 8px 15px;
            border-radius: 8px; font-weight: bold; font-size: 12px; cursor: pointer;
        }

        .premium-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 25px; padding: 35px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .input-vip {
            background: rgba(0,0,0,0.4); border: 1px solid #333;
            width: 90%; color: #fff; font-size: 20px; text-align: center;
            padding: 12px; border-radius: 12px; margin-bottom: 20px; outline: none;
        }
        .input-vip:focus { border-color: var(--gold); }

        .btn-elite {
            width: 90%; background: linear-gradient(45deg, #c9a050, #f9e29b); color: #000;
            padding: 15px; border-radius: 12px; border: none; font-weight: bold;
            font-size: 15px; cursor: pointer; text-transform: uppercase;
        }

        /* المعرض */
        .image-card {
            width: 100%; border-radius: 18px; overflow: hidden; margin-bottom: 25px;
            background: #111; border: 1px solid rgba(255,255,255,0.05);
            animation: fadeIn 0.8s ease forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .image-card img { width: 100%; display: block; }
        .image-info { padding: 15px; text-align: right; background: #0c0c0c; border-top: 1px solid #1a1a1a; }
        .image-info p { margin: 0; font-size: 14px; color: #bbb; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="lock-screen" class="container">
        <h2>عينات حسو</h2>
        <div class="divider"></div>
        <p style="color: #666; font-size: 13px; margin-bottom: 30px;">يرجى نسخ الرمز للدخول</p>

        <div class="copy-box">
            <div class="code-text" id="targetCode">1234</div>
            <button class="copy-btn" onclick="copyCode()">اضغط للنسخ</button>
        </div>

        <div class="premium-card">
            <input type="number" id="passInput" class="input-vip" placeholder="أدخل الرمز هنا">
            <button class="btn-elite" onclick="checkPass()">تأكيد الدخول</button>
        </div>
    </div>

    <div id="content" class="container hidden">
        <h2>عينات حسو</h2>
        <div class="divider" style="width: 100px;"></div>
        <div id="items-list"></div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS4V6swf_1fE33kPaIG6nNS4lbf6Ii87Hxx9hKnR_xDvE4vpbm8SG2ZrPaGoMky5NGpAt-tkNzv7L4j/pub?output=csv";
        let correctPass = "";

        async function init() {
            try {
                const resp = await fetch(CSV_URL);
                const text = await resp.text();
                const rows = text.split('\n').slice(1);
                correctPass = rows[0].split(',')[0].trim();
                document.getElementById('targetCode').innerText = correctPass;

                const list = document.getElementById('items-list');
                rows.forEach(row => {
                    const cols = row.split(',');
                    if(cols[1] && cols[1].trim().startsWith('http')) {
                        list.innerHTML += `
                            <div class="image-card">
                                <img src="${cols[1].trim()}" loading="lazy">
                                <div class="image-info"><p>${cols[2] || ''}</p></div>
                            </div>`;
                    }
                });
            } catch (e) { console.error("Error loading data"); }
        }

        function copyCode() {
            const code = document.getElementById('targetCode').innerText;
            navigator.clipboard.writeText(code);
            window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
            alert("تم نسخ الرمز: " + code);
        }

        function checkPass() {
            const input = document.getElementById('passInput').value;
            if(input === correctPass) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('content').classList.remove('hidden');
                window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            } else {
                alert("الرمز غير صحيح!");
            }
        }

        init();
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
        window.Telegram.WebApp.headerColor = "#050505";
    </script>
</body>
</html>
