<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حصريات حسو</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:#0a0a0a;
  color:#fff;
}

/* login */
#login{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:12px;
  padding:20px;
}

.title{
  font-size:28px;
  font-weight:900;
  color:#f5c518;
}

.code{
  font-size:60px;
  font-weight:900;
  color:#f5c518;
  cursor:pointer;
}

.btn{
  width:100%;
  max-width:300px;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:900;
}

.copy{background:#f5c518;color:#000;}
.paste{background:#333;color:#fff;}
.enter{background:#f5c518;color:#000;}

.input{
  width:100%;
  max-width:300px;
  padding:12px;
  text-align:center;
  border-radius:10px;
  border:2px solid #222;
  background:#1a1a1a;
  color:#fff;
}

/* app */
#app{
  display:none;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#111;
  border-bottom:1px solid #222;
}

.contact{
  margin:10px;
  padding:12px;
  text-align:center;
  font-weight:900;
  border-radius:12px;
  background:#f5c518;
  color:#000;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:#1a1a1a;
  border-radius:12px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card div{
  padding:8px;
  font-size:13px;
}

/* animation */
.fade-in{
  animation:show .5s ease forwards;
}

@keyframes show{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">

  <div class="title">حصريات حسو</div>

  <div class="code" onclick="copy()">1234</div>

  <button class="btn copy" onclick="copy()">نسخ</button>
  <button class="btn paste" onclick="paste()">لصق</button>

  <input id="code" class="input" placeholder="كلمة المرور">

  <button class="btn enter" onclick="enter()">دخول</button>

</div>

<!-- APP -->
<div id="app">

  <div class="header">
    <div></div>
    <div style="color:#f5c518;font-weight:900;">حصريات حسو</div>
    <div></div>
  </div>

  <div class="contact">
    <a href="https://t.me/xxnnn8" style="color:#000;text-decoration:none;">
      للتواصل معنا @xxnnn8
    </a>
  </div>

  <div class="grid" id="grid"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxOiUTM6SaheW9uf_5uIECabsMxSDoniDF5MeXGL1Q5hm1M7e05RaCs6PIwqU6G5UtZ/exec";

let cache=[];

/* safe copy */
function copy(){
  navigator.clipboard.writeText("1234");
}

/* paste */
async function paste(){
  try{
    const t=await navigator.clipboard.readText();
    document.getElementById("code").value=t;
  }catch(e){}
}

/* enter */
function enter(){

  if(document.getElementById("code").value!=="1234") return;

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  load();
}

/* 🔥 SAFE LOAD (ما يطيح الصفحة) */
async function load(){

  try{

    const res=await fetch(API+"?t="+Date.now());
    let data=await res.json();

    if(!Array.isArray(data)) data=[];

    cache=data.map(x=>{

      // يدعم أي شكل شيت بدون ما ينهار
      let name = x.name || x.Name || "بدون اسم";

      let raw = x.video || x.videos || x.links || "";

      let links = String(raw)
        .split(" - ")
        .map(v=>v.trim())
        .filter(v=>v.length>0);

      return{
        name,
        cover: x.cover || links[0],
        links
      };

    }).filter(a=>a.links.length>0);

    render();

  }catch(e){

    console.log("API ERROR",e);

    document.getElementById("grid").innerHTML=
    "<div style='padding:20px'>⚠️ خطأ تحميل البيانات</div>";

  }
}

/* render */
function render(){

  document.getElementById("grid").innerHTML=
  cache.map((a,i)=>`

    <div class="card" onclick="openAlbum(${i})">
      <img src="${a.cover}">
      <div>${a.name}</div>
    </div>

  `).join("");

}

/* viewer */
function openAlbum(i){

  const a=cache[i];
  let index=0;

  const m=document.createElement("div");
  m.style.cssText="position:fixed;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column;";

  m.innerHTML=`
    <div style="padding:15px;color:#f5c518;display:flex;justify-content:space-between;">
      <div>${a.name}</div>
      <button onclick="this.parentElement.parentElement.remove()" style="background:none;border:none;color:#fff;font-size:20px;">✕</button>
    </div>

    <div style="flex:1;display:flex;align-items:center;justify-content:center;">
      <img id="img" src="${a.links[0]}" style="max-width:100%;max-height:90vh;border-radius:10px;">
    </div>

    <div style="display:flex;justify-content:space-between;padding:15px;">
      <button id="prev">◀</button>
      <button id="next">▶</button>
    </div>
  `;

  document.body.appendChild(m);

  const img=m.querySelector("#img");

  function update(){
    img.src=a.links[index];
  }

  m.querySelector("#next").onclick=()=>{
    index=(index+1)%a.links.length;
    update();
  };

  m.querySelector("#prev").onclick=()=>{
    index=(index-1+a.links.length)%a.links.length;
    update();
  };

  /* swipe */
  let sx=0;

  img.addEventListener("touchstart",e=>{
    sx=e.touches[0].clientX;
  });

  img.addEventListener("touchend",e=>{
    let ex=e.changedTouches[0].clientX;

    if(sx-ex>50){
      index=(index+1)%a.links.length;
      update();
    }

    if(ex-sx>50){
      index=(index-1+a.links.length)%a.links.length;
      update();
    }
  });

}

</script>

</body>
</html>
