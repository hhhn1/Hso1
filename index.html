<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عينات حسو - VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #c9a050; --bg: #0f1115; --card-bg: #1a1d23; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; }

        .main-title { font-size: 35px; font-weight: 900; color: var(--gold); margin-top: 50px; text-align: center; }
        .divider { width: 60px; height: 3px; background: var(--gold); margin: 15px auto; border-radius: 10px; }

        .btn-copy { background: #000; color: var(--gold); border: 1px solid var(--gold); padding: 12px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 15px; }

        .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .contact-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid #333; padding: 8px 15px; border-radius: 12px; display: flex; align-items: center; text-decoration: none; color: #fff; font-size: 13px; }
        .online-dot { width: 8px; height: 8px; background: #4caf50; border-radius: 50%; margin-left: 8px; box-shadow: 0 0 8px #4caf50; }

        /* تنسيق الشبكة مثل الصورة */
        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: var(--card-bg); border-radius: 15px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid #222; }
        .media-box { width: 100%; height: 220px; background: #000; }
        .media-box img, .media-box video { width: 100%; height: 100%; object-fit: cover; }
        
        /* النص فوق الصورة */
        .card-info { position: absolute; bottom: 0; right: 0; left: 0; padding: 15px 10px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }
        .card-title { font-size: 12px; font-weight: bold; color: #fff; margin-bottom: 5px; text-align: right; }

        /* النافذة المنبثقة للعرض المباشر */
        #viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: none; align-items: center; justify-content: center; }
        #viewer img, #viewer video { max-width: 100%; max-height: 100%; }
        .close-viewer { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); color: #fff; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .footer { text-align: center; padding: 30px; color: #555; font-size: 12px; }
        .hidden { display: none; }
        #lock-screen { text-align: center; padding-top: 60px; }
        .input-vip { width: 90%; padding: 16px; border-radius: 15px; border: 1px solid #333; background:#1e222a; color:#fff; text-align:center; font-size:18px; margin-bottom: 20px; outline: none; }
        .btn-enter { width: 90%; padding: 18px; border-radius: 15px; border: none; background: linear-gradient(45deg, #c9a050, #f9e29b); color:#000; font-weight: 900; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="main-title">عينات حسو</div>
        <div class="divider"></div>
        <p style="color: #888;">ادخل الرمز</p>
        <div style="background:rgba(255,255,255,0.02); padding:35px 20px; border-radius:30px; margin:30px 0; border: 1px solid rgba(201,160,80,0.1);">
            <div id="targetCode" style="font-size:38px; font-weight:900; color:#fff;">1234</div>
            <button class="btn-copy" onclick="copyCode()">نسخ الرمز</button>
        </div>
        <input type="number" id="passInput" class="input-vip" placeholder="ادخل الرمز">
        <button class="btn-enter" onclick="checkPass()">الدخول</button>
    </div>

    <div id="content" class="hidden">
        <div class="top-header">
            <a href="https://t.me/xxnnn8" class="contact-btn">
                <span class="online-dot"></span>
                <span style="color:var(--gold); font-weight:bold;">xxnnn8 @</span>
                <span style="margin-right:5px">تواصل معنا</span>
            </a>
            <div style="font-weight: bold; font-size: 18px;">📂 الألبومات</div>
        </div>
        <div id="items-list" class="gallery"></div>
        <div class="footer">جميع الحقوق محفوظة لدى حسو <br> @xxnnn8</div>
    </div>

    <div id="viewer">
        <button class="close-viewer" onclick="closeViewer()">إغلاق</button>
        <div id="viewer-content" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;"></div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS4V6swf_1fE33kPaIG6nNS4lbf6Ii87Hxx9hKnR_xDvE4vpbm8SG2ZrPaGoMky5NGpAt-tkNzv7L4j/pub?output=csv";
        let correctPass = "";

        async function init() {
            try {
                const resp = await fetch(CSV_URL);
                const text = await resp.text();
                const rows = text.split('\n').slice(1);
                correctPass = rows[0].split(',')[0].trim();
                document.getElementById('targetCode').innerText = correctPass;

                const list = document.getElementById('items-list');
                rows.forEach(row => {
                    const cols = row.split(',');
                    if(cols[1] && cols[1].trim()) {
                        const url = cols[1].trim();
                        const title = cols[2] || 'ألبوم جديد';
                        const isVid = url.toLowerCase().endsWith('.mp4');
                        list.innerHTML += `
                            <div class="card" onclick="openViewer('${url}', ${isVid})">
                                <div class="media-box">
                                    ${isVid ? `<video muted loop playsinline><source src="${url}" type="video/mp4"></video>` : `<img src="${url}" loading="lazy">`}
                                </div>
                                <div class="card-info">
                                    <div class="card-title">${title}</div>
                                    <div style="font-size:10px; opacity:0.7;">🖼️ عرض مباشر</div>
                                </div>
                            </div>`;
                    }
                });
            } catch (e) { console.error("Load Error"); }
        }

        function openViewer(url, isVid) {
            const container = document.getElementById('viewer-content');
            container.innerHTML = isVid 
                ? `<video controls autoplay style="width:100%"><source src="${url}" type="video/mp4"></video>` 
                : `<img src="${url}">`;
            document.getElementById('viewer').style.display = 'flex';
            window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
        }

        function closeViewer() {
            document.getElementById('viewer').style.display = 'none';
            document.getElementById('viewer-content').innerHTML = '';
        }

        function checkPass() {
            if(document.getElementById('passInput').value === correctPass) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('content').classList.remove('hidden');
                window.Telegram.WebApp.expand();
            } else { alert("الرمز خطأ"); }
        }

        function copyCode() {
            navigator.clipboard.writeText(document.getElementById('targetCode').innerText);
            alert("تم نسخ الرمز");
        }

        init();
        window.Telegram.WebApp.ready();
    </script>
</body>
</html>
