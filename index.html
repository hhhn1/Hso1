<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>حصريات حسو</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0a0a;
  --surface:#111;
  --surface2:#1a1a1a;
  --border:#222;
  --yellow:#f5c518;
  --white:#fff;
  --gray:#888;
  --green:#2ecc71;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Cairo',sans-serif;
  background:var(--bg);
  color:var(--white);
}

/* دخول */
#passcode-screen{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.logo-title{
  font-size:28px;
  font-weight:900;
  color:var(--yellow);
  margin-bottom:15px;
}

.copy-box{
  width:100%;
  max-width:350px;
  background:var(--surface2);
  border:2px dashed var(--yellow);
  padding:15px;
  border-radius:15px;
  text-align:center;
  margin-bottom:15px;
}

.copy-box strong{font-size:24px;}

.contact-btn{
  width:100%;
  max-width:350px;
  background:var(--green);
  color:#000;
  padding:12px;
  border-radius:12px;
  text-align:center;
  text-decoration:none;
  margin-bottom:20px;
  font-weight:700;
}

.code-card{
  width:100%;
  max-width:350px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:20px;
}

.code-input{
  width:100%;
  padding:12px;
  text-align:center;
  font-size:20px;
  border-radius:10px;
  border:2px solid var(--border);
  background:var(--surface2);
  color:var(--yellow);
  margin-bottom:10px;
}

.btn-enter{
  width:100%;
  padding:14px;
  background:var(--yellow);
  border:none;
  border-radius:10px;
  font-weight:900;
}

/* التطبيق */
#main-screen{
  display:none;
}

/* الهيدر */
.app-header{
  background:var(--surface);
  padding:15px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid var(--border);
}

/* العنوان */
.main-title{
  padding:15px;
}

.main-title h2{
  color:var(--yellow);
}

/* 🔥 شبكة الألبومات */
.albums-list{
  padding:12px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

/* كرت الألبوم */
.album-item{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
}

/* الغلاف */
.album-thumb{
  width:100%;
  height:140px;
  position:relative;
}

.album-thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* المعلومات */
.album-info{
  padding:10px;
}

.album-name{
  font-size:15px;
  font-weight:800;
}

.album-meta{
  font-size:12px;
  color:var(--gray);
  margin-top:4px;
}
</style>
</head>

<body>

<!-- شاشة الدخول -->
<div id="passcode-screen">

  <div class="logo-title">حصريات حسو</div>

  <div class="copy-box" onclick="copyOnlyCode()">
    <div>انسخ الرمز</div>
    <strong id="the-code">1234</strong>
  </div>

  <a class="contact-btn" href="https://t.me/xxnnn8" target="_blank">
    للتواصل معنا @xxnnn8
  </a>

  <div class="code-card">
    <input id="code-input" class="code-input" placeholder="أدخل الرمز">
    <button class="btn-enter" onclick="checkCode()">دخول</button>
  </div>

</div>

<!-- التطبيق -->
<div id="main-screen">

  <div class="app-header">
    <div>@xxnnn8</div>
    <div style="color:var(--yellow);font-weight:900;">حصريات حسو</div>
    <div></div>
  </div>

  <div class="main-title">
    <h2>الألبومات</h2>
  </div>

  <div class="albums-list" id="albumsList"></div>

</div>

<script>

const CORRECT_CODE = "1234";
const API = "https://script.google.com/macros/s/AKfycbxOiUTM6SaheW9uf_5uIECabsMxSDoniDF5MeXGL1Q5hm1M7e05RaCs6PIwqU6G5UtZ/exec";

let allAlbums = [];
let cache = false;

function copyOnlyCode(){
  navigator.clipboard.writeText("1234");
  alert("تم النسخ");
}

function checkCode(){
  if(document.getElementById("code-input").value === CORRECT_CODE){
    sessionStorage.setItem("auth","1");
    showApp();
  }
}

function showApp(){
  document.getElementById("passcode-screen").style.display="none";
  document.getElementById("main-screen").style.display="block";
  loadData();
}

/* ⚡ تحميل سريع + كاش */
async function loadData(){

  if(cache){
    render();
    return;
  }

  try {
    const res = await fetch(API + "?t=" + Date.now());
    const data = await res.json();

    allAlbums = data.map(item => {
      const links = (item.video || "").split(" - ");

      return {
        name: item.name,
        links: links,
        count: links.length,
        cover: item.cover || links[0] || "https://via.placeholder.com/300"
      };
    });

    cache = true;
    render();

  } catch(e){
    document.getElementById("albumsList").innerHTML =
      "<div style='color:#888;text-align:center;padding:30px'>فشل التحميل</div>";
  }
}

/* 🔥 عرض الشبكة */
function render(){
  document.getElementById("albumsList").innerHTML = allAlbums.map((a,i)=>`

    <div class="album-item" onclick="openAlbum(${i})">

      <div class="album-thumb">
        <img data-src="${a.cover}" class="lazy">
      </div>

      <div class="album-info">
        <div class="album-name">${a.name}</div>
        <div class="album-meta">${a.count} مقاطع • @xxnnn8</div>
      </div>

    </div>

  `).join("");

  lazyLoad();
}

/* ⚡ Lazy Load */
function lazyLoad(){
  const imgs = document.querySelectorAll("img.lazy");

  const observer = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        e.target.src = e.target.dataset.src;
        observer.unobserve(e.target);
      }
    });
  });

  imgs.forEach(img=>observer.observe(img));
}

/* فتح الألبوم */
function openAlbum(i){
  const a = allAlbums[i];

  const modal = document.createElement("div");
  modal.style = "position:fixed;inset:0;background:#000;z-index:9999;overflow:auto;padding:10px";

  modal.innerHTML = `
    <button onclick="this.parentElement.remove()" style="color:#fff">إغلاق</button>
    <h3 style="color:#f5c518">${a.name}</h3>

    ${a.links.map(l=>`
      <video src="${l}" controls preload="metadata"
        style="width:100%;margin:5px 0;border-radius:10px"></video>
    `).join("")}
  `;

  document.body.appendChild(modal);
}

if(sessionStorage.getItem("auth")==="1") showApp();

</script>

</body>
</html>
