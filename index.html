<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hasso VIP PRO</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root {
    --gold: #f1b933;
    --bg: #12141a;
    --card-bg: #1c1f26;
    --text: #ffffff;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
}

/* شاشة القفل */
#lock-screen {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    animation: fade 0.5s;
}

@keyframes fade {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1;}
}

.lock-header {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 25px;
}

/* صندوق الكود */
.copy-box {
    width: 100%;
    max-width: 350px;
    background: #1a1c22;
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    margin-bottom: 15px;
}

.target-code {
    color: var(--gold);
    font-size: 34px;
    font-weight: bold;
    letter-spacing: 6px;
}

/* أزرار */
button {
    transition: 0.3s;
}

.btn-copy, .btn-enter {
    width: 100%;
    background: var(--gold);
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
}

.btn-copy:hover, .btn-enter:hover {
    background: #d9a52c;
}

/* انبوت */
.input-vip {
    width: 100%;
    max-width: 350px;
    background: #252830;
    border: none;
    padding: 16px;
    border-radius: 12px;
    color: #fff;
    text-align: center;
    font-size: 18px;
    margin-bottom: 15px;
    outline: none;
}

/* المحتوى */
#content {
    display: none;
    padding: 15px;
    animation: fade 0.5s;
}

.main-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
}

.gallery {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.card {
    background: var(--card-bg);
    border-radius: 12px;
    overflow: hidden;
}

.media-box {
    height: 180px;
}

.media-box img, .media-box video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* viewer */
#viewer {
    position: fixed;
    inset: 0;
    background: #000;
    display: none;
    flex-direction: column;
    z-index: 9999;
}

.close-btn {
    margin: 15px;
    background: var(--gold);
    border: none;
    padding: 10px;
    border-radius: 8px;
}

/* إشعار */
.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #111;
    color: var(--gold);
    padding: 10px 20px;
    border-radius: 10px;
    opacity: 0;
    transition: 0.3s;
}

/* الحقوق */
.footer {
    text-align: center;
    font-size: 12px;
    color: #777;
    margin-top: 15px;
}

.footer span {
    color: var(--gold);
}
</style>
</head>

<body>

<div id="lock-screen">
    <div class="lock-header">🔐 ادخل الرمز للوصول</div>

    <div class="copy-box">
        <div id="targetCode" class="target-code">----</div>
        <button class="btn-copy" onclick="copyPass()">نسخ الرمز</button>
    </div>

    <input id="passInput" class="input-vip" placeholder="ادخل الرمز">
    <button class="btn-enter" onclick="checkPass()">دخول</button>

    <div class="footer">
        جميع الحقوق محفوظة © <span>Hasso</span> | للتواصل: <span>@xxnnn8</span>
    </div>
</div>

<div id="content">
    <div class="main-header">
        <div>📂 ألبومات حسو</div>
        <div style="color:var(--gold)">@xxnnn8</div>
    </div>

    <div id="items-list" class="gallery"></div>

    <div class="footer">
        © Hasso VIP PRO
    </div>
</div>

<div id="viewer">
    <button class="close-btn" onclick="closeViewer()">إغلاق</button>
    <div id="viewer-content"></div>
</div>

<div id="toast" class="toast"></div>

<script>
const SCRIPT_URL = "PUT_API_HERE";
let correctPass = "";

// إشعار
function showToast(msg) {
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.style.opacity = "1";
    setTimeout(() => t.style.opacity = "0", 2000);
}

// تيليجرام سيف
function tg(type) {
    try {
        window.Telegram.WebApp.HapticFeedback[type]("medium");
    } catch(e){}
}

async function init() {
    try {
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();

        correctPass = data[0].code.toString().trim();
        document.getElementById("targetCode").innerText = correctPass;

        const list = document.getElementById("items-list");

        data.forEach(item => {
            if(item.links) {
                const urls = item.links.split(",");
                const isVid = urls[0].includes(".mp4");

                list.innerHTML += `
                <div class="card" onclick='openViewer(${JSON.stringify(urls)})'>
                    <div class="media-box">
                        ${isVid ? `<video muted loop><source src="${urls[0]}"></video>` : `<img src="${urls[0]}">`}
                    </div>
                </div>`;
            }
        });

    } catch(e) {
        showToast("خطأ بالاتصال");
    }
}

function checkPass() {
    if(document.getElementById("passInput").value === correctPass) {
        document.getElementById("lock-screen").style.display = "none";
        document.getElementById("content").style.display = "block";
        showToast("تم الدخول ✅");
        tg("notificationOccurred");
    } else {
        showToast("رمز خطأ ❌");
        tg("notificationOccurred");
    }
}

function copyPass() {
    navigator.clipboard.writeText(correctPass);
    showToast("تم النسخ");
    tg("impactOccurred");
}

function openViewer(urls) {
    const cont = document.getElementById("viewer-content");
    cont.innerHTML = "";

    urls.forEach(u => {
        cont.innerHTML += u.includes(".mp4") 
        ? `<video controls style="width:100%"><source src="${u}"></video>`
        : `<img src="${u}" style="width:100%">`;
    });

    document.getElementById("viewer").style.display = "flex";
}

function closeViewer() {
    document.getElementById("viewer").style.display = "none";
}

init();
</script>

</body>
</html>
