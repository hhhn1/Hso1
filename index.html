<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حسو الألبومات</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0a0a;
  --surface:#111;
  --surface2:#1a1a1a;
  --border:#222;
  --yellow:#f5c518;
  --white:#fff;
  --gray:#888;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Cairo',sans-serif;
  background:var(--bg);
  color:var(--white);
}

/* الهيدر */
.app-header{
  padding:12px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid var(--border);
}

/* الشبكة */
.albums-list{
  padding:12px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

/* الكرت */
.album-item{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
}

/* الغلاف */
.album-thumb{
  height:100px;
  background-size:cover;
  background-position:center;
}

/* المعلومات */
.album-info{
  padding:10px;
}

.album-name{
  font-weight:700;
  font-size:14px;
}

.album-meta{
  font-size:11px;
  color:var(--gray);
  margin-top:4px;
}
</style>
</head>

<body>

<div class="app-header">
  <div>@xxnnn8</div>
  <div style="color:var(--yellow);font-weight:900;">حسو</div>
  <div></div>
</div>

<div class="albums-list" id="albumsList"></div>

<script>

const API = "YOUR_GOOGLE_SCRIPT_URL_HERE";

let albums = [];

async function load(){
  const res = await fetch(API);
  const data = await res.json();

  albums = data.map(item => {

    const links = (item.video || "").split(" - ");

    // ⭐ الغلاف: D أولاً ثم أول رابط
    const cover =
      item.cover ||
      item.d ||
      links[0] ||
      "https://via.placeholder.com/300x200";

    return {
      name: item.name,
      links: links,
      count: links.length,
      cover: cover
    };
  });

  render();
}

function render(){
  document.getElementById("albumsList").innerHTML = albums.map((a,i)=>`
    <div class="album-item" onclick="openAlbum(${i})">

      <div class="album-thumb" style="background-image:url('${a.cover}')"></div>

      <div class="album-info">
        <div class="album-name">${a.name}</div>
        <div class="album-meta">${a.count} مقطع • @xxnnn8</div>
      </div>

    </div>
  `).join("");
}

function openAlbum(i){
  const a = albums[i];

  const modal = document.createElement("div");
  modal.style = "position:fixed;inset:0;background:#000;z-index:9999;overflow:auto;padding:10px";

  modal.innerHTML = `
    <button onclick="this.parentElement.remove()" style="color:#fff">إغلاق</button>
    <h3 style="color:#f5c518">${a.name}</h3>

    ${a.links.map(l=>`
      <video src="${l}" controls style="width:100%;margin:5px 0;border-radius:10px"></video>
    `).join("")}
  `;

  document.body.appendChild(modal);
}

load();

</script>

</body>
</html>
