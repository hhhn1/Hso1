<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حصريات حسو</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0a0a;
  --surface:#111;
  --surface2:#1a1a1a;
  --yellow:#f5c518;
  --gray:#888;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Cairo',sans-serif;
  background:var(--bg);
  color:#fff;
}

/* 🔐 شاشة الدخول */
#login{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:20px;
  padding:20px;
}

/* الرقم الكبير */
.code-big{
  font-size:60px;
  font-weight:900;
  color:var(--yellow);
  cursor:pointer;
  user-select:none;
}

/* زر لصق يمين */
.top-bar{
  width:100%;
  max-width:350px;
  display:flex;
  justify-content:flex-end;
}

.paste-btn{
  background:var(--yellow);
  border:none;
  padding:10px 15px;
  border-radius:10px;
  font-weight:900;
  cursor:pointer;
}

/* زر دخول */
.enter-btn{
  width:100%;
  max-width:350px;
  padding:14px;
  border:none;
  background:var(--yellow);
  font-weight:900;
  border-radius:10px;
}

/* التطبيق */
#app{
  display:none;
}

/* الهيدر */
.header{
  padding:15px;
  display:flex;
  justify-content:space-between;
  background:#111;
  border-bottom:1px solid #222;
}

/* زر تواصل */
.contact{
  margin:10px;
  background:var(--yellow);
  color:#000;
  padding:12px;
  text-align:center;
  font-weight:900;
  border-radius:12px;
}

/* الشبكة */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:#1a1a1a;
  border-radius:12px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card div{
  padding:8px;
  font-weight:800;
}
</style>
</head>

<body>

<!-- 🔐 شاشة الدخول -->
<div id="login">

  <!-- زر لصق يمين -->
  <div class="top-bar">
    <button class="paste-btn" onclick="pasteCode()">📋 لصق</button>
  </div>

  <!-- الرقم الكبير -->
  <div class="code-big" onclick="copyCode()">1234</div>

  <!-- دخول -->
  <button class="enter-btn" onclick="enter()">دخول</button>

</div>

<!-- 📁 التطبيق -->
<div id="app">

  <div class="header">
    <div>@xxnnn8</div>
    <div style="color:#f5c518;font-weight:900;">حصريات حسو</div>
    <div></div>
  </div>

  <div class="contact">للتواصل معنا @xxnnn8</div>

  <div class="grid" id="grid"></div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxOiUTM6SaheW9uf_5uIECabsMxSDoniDF5MeXGL1Q5hm1M7e05RaCs6PIwqU6G5UtZ/exec";

let cache = null;

/* نسخ الرقم */
function copyCode(){
  navigator.clipboard.writeText("1234");
}

/* لصق */
async function pasteCode(){
  try{
    const t = await navigator.clipboard.readText();
    if(t.trim()==="1234"){
      enter();
    }
  }catch(e){
    alert("انسخه يدوياً");
  }
}

/* دخول */
function enter(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  load();
}

/* ⚡ تحميل لحظي */
async function load(){

  if(cache){
    render(cache);
    return;
  }

  const res = await fetch(API + "?t=" + Date.now());
  const data = await res.json();

  cache = data.map(x=>{
    const links = (x.video||"").split(" - ");
    return {
      name:x.name,
      cover: x.cover || links[0],
      count:links.length
    };
  });

  render(cache);
}

/* عرض سريع */
function render(data){
  document.getElementById("grid").innerHTML =
    data.map((a,i)=>`
      <div class="card">
        <img loading="lazy" src="${a.cover}">
        <div>${a.name}<br><span style="color:#888;font-size:12px">${a.count} مقاطع</span></div>
      </div>
    `).join("");
}

/* تشغيل تلقائي إذا داخل */
if(sessionStorage.getItem("auth")==="1") enter();

</script>

</body>
</html>
