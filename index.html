<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حصريات حسو</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:#0a0a0a;
  color:#fff;
}

/* 🔐 LOGIN */
#login{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:12px;
  padding:20px;
}

.title{
  font-size:28px;
  font-weight:900;
  color:#f5c518;
}

.code{
  font-size:60px;
  font-weight:900;
  color:#f5c518;
  cursor:pointer;
}

.btn{
  width:100%;
  max-width:300px;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:900;
  cursor:pointer;
}

.copy{background:#f5c518;color:#000;}
.paste{background:#333;color:#fff;}
.enter{background:#f5c518;color:#000;}

.input{
  width:100%;
  max-width:300px;
  padding:12px;
  text-align:center;
  border-radius:10px;
  border:2px solid #222;
  background:#1a1a1a;
  color:#fff;
  outline:none;
}

/* ✨ انيميشن */
.fade-out{
  opacity:0;
  transform:scale(0.95);
  transition:0.4s;
}

.fade-in{
  animation:show 0.6s ease forwards;
}

@keyframes show{
  from{opacity:0;transform:translateY(25px);}
  to{opacity:1;transform:translateY(0);}
}

/* 📁 APP */
#app{
  display:none;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#111;
  border-bottom:1px solid #222;
}

/* 🔥 زر التواصل */
.contact{
  margin:10px;
  padding:12px;
  text-align:center;
  font-weight:900;
  border-radius:12px;
  background:#f5c518;
  color:#000;
}

.contact a{
  color:#000;
  text-decoration:none;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login">

  <div class="title">حصريات حسو</div>

  <div class="code" onclick="copy()">1234</div>

  <button class="btn copy" onclick="copy()">نسخ</button>

  <button class="btn paste" onclick="paste()">لصق</button>

  <input id="code" class="input" placeholder="كلمة المرور">

  <button class="btn enter" onclick="enter()">دخول</button>

</div>

<!-- 📁 APP -->
<div id="app">

  <div class="header">
    <div></div>
    <div style="color:#f5c518;font-weight:900;">حصريات حسو</div>
    <div></div>
  </div>

  <!-- 🔥 التواصل الجديد -->
  <div class="contact">
    <a href="https://t.me/xxnnn8" target="_blank">
      للتواصل معنا @xxnnn8
    </a>
  </div>

</div>

<script>

function copy(){
  navigator.clipboard.writeText("1234");
}

async function paste(){
  try{
    const t=await navigator.clipboard.readText();
    document.getElementById("code").value=t;
  }catch(e){}
}

function enter(){

  if(document.getElementById("code").value!=="1234")return;

  const login=document.getElementById("login");
  const app=document.getElementById("app");

  login.classList.add("fade-out");

  setTimeout(()=>{
    login.style.display="none";
    app.style.display="block";
    app.classList.add("fade-in");
  },400);
}

</script>

</body>
</html>
