<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حصريات حسو</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:#000;
  color:#fff;
}

/* LOGIN */
#login{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:12px;
  padding:20px;
}

.title{
  font-size:30px;
  font-weight:900;
  color:#f5c518;
}

.code{
  font-size:50px;
  font-weight:900;
  color:#f5c518;
  cursor:pointer;
}

.input{
  width:100%;
  max-width:300px;
  padding:12px;
  text-align:center;
  border-radius:10px;
  border:none;
  background:#111;
  color:#fff;
}

.btn{
  width:100%;
  max-width:300px;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:900;
}

.copy{background:#f5c518;color:#000;}
.enter{background:#f5c518;color:#000;}

/* APP */
#app{display:none;}

.top{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
  border-bottom:1px solid #222;
}

.online{color:#00ff66;font-weight:700;}

.contact{
  background:#f5c518;
  color:#000;
  text-align:center;
  padding:10px;
  font-weight:900;
}

.stats{
  display:flex;
  justify-content:space-around;
  padding:10px;
  font-size:13px;
  color:#aaa;
}

.search{
  padding:10px;
}

.search input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#111;
  color:#fff;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:#111;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card div{
  padding:8px;
  font-size:13px;
}

/* viewer */
.viewer{
  position:fixed;
  inset:0;
  background:#000;
  z-index:9999;
  display:flex;
  flex-direction:column;
}

.viewer img{
  max-width:100%;
  max-height:85vh;
  margin:auto;
}

.nav{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

.nav button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  font-weight:900;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="title">حصريات حسو</div>

  <div class="code" onclick="copy()">1234</div>

  <button class="btn copy" onclick="copy()">نسخ الرمز</button>

  <input id="code" class="input" placeholder="كلمة المرور">

  <button class="btn enter" onclick="enter()">دخول</button>
</div>

<!-- APP -->
<div id="app">

  <div class="top">
    <div class="online">🟢 متصل الآن</div>
    <div>حصريات حسو</div>
  </div>

  <div class="contact">
    للتواصل معنا @xxnnn8
  </div>

  <div class="stats">
    <div>الألبومات: <span id="count">0</span></div>
    <div>Ultra Fast ⚡</div>
  </div>

  <div class="search">
    <input id="search" placeholder="ابحث...">
  </div>

  <div class="grid" id="grid"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxXHimt8YCbt4wUPves03ewIZdQZ0P-UqJlUc0TosKE0ixqRANx5H9B_eakod608_OE/exec";

let data=[];
let filtered=[];

/* login */
function copy(){
  navigator.clipboard.writeText("1234");
}

function enter(){
  if(document.getElementById("code").value!=="1234") return;

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  load();
}

/* load */
async function load(){
  try{
    const res=await fetch(API+"?t="+Date.now(), {cache:"no-store"});
    const json=await res.json();

    data=json.map(x=>{
      let links=String(x.video||"")
        .split(" - ")
        .map(e=>e.trim())
        .filter(e=>e.startsWith("http"));

      return{
        name:x.name||"بدون اسم",
        cover:links[0]||"https://via.placeholder.com/300",
        links:links.length?links:["https://via.placeholder.com/300"]
      };
    });

    filtered=data;
    document.getElementById("count").innerText=data.length;
    render();

  }catch(e){
    console.log("API Error",e);
  }
}

/* render */
function render(){
  const g=document.getElementById("grid");

  g.innerHTML=filtered.map((a,i)=>`
    <div class="card" onclick="openAlbum(${i})">
      <img src="${a.cover}" loading="lazy"
      onerror="this.src='https://via.placeholder.com/300'">
      <div>${a.name}</div>
    </div>
  `).join("");
}

/* search */
document.addEventListener("input",e=>{
  if(e.target.id==="search"){
    let t=e.target.value.toLowerCase();
    filtered=data.filter(x=>x.name.toLowerCase().includes(t));
    render();
  }
});

/* viewer */
function openAlbum(i){

  let a=filtered[i];
  let index=0;

  let v=document.createElement("div");
  v.className="viewer";

  v.innerHTML=`
    <div class="nav">
      <button onclick="this.parentElement.parentElement.remove()">إغلاق</button>
      <button id="prev">◀</button>
      <button id="next">▶</button>
    </div>

    <img id="img"
    src="${a.links[0]}"
    onerror="this.src='https://via.placeholder.com/300'">
  `;

  document.body.appendChild(v);

  const img=v.querySelector("#img");

  function update(){
    img.src=a.links[index];
  }

  v.querySelector("#next").onclick=()=>{
    index=(index+1)%a.links.length;
    update();
  };

  v.querySelector("#prev").onclick=()=>{
    index=(index-1+a.links.length)%a.links.length;
    update();
  };

  /* swipe */
  let start=0;

  img.addEventListener("touchstart",e=>{
    start=e.touches[0].clientX;
  });

  img.addEventListener("touchend",e=>{
    let end=e.changedTouches[0].clientX;

    if(start-end>50){
      index=(index+1)%a.links.length;
      update();
    }

    if(end-start>50){
      index=(index-1+a.links.length)%a.links.length;
      update();
    }
  });

}

</script>

</body>
</html>
