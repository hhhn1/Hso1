<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حصريات حسو</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:#0a0a0a;
  color:#fff;
}

/* 🔐 شاشة الدخول */
#login{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:12px;
  padding:20px;
  transition:0.4s;
}

/* العنوان */
.title{
  font-size:28px;
  font-weight:900;
  color:#f5c518;
  text-align:center;
}

/* الرمز */
.code-big{
  font-size:60px;
  font-weight:900;
  color:#f5c518;
  cursor:pointer;
}

/* أزرار */
.btn{
  width:100%;
  max-width:300px;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:900;
  cursor:pointer;
}

.copy{background:#f5c518;color:#000;}
.paste{background:#333;color:#fff;}
.enter{background:#f5c518;color:#000;}

/* حقل */
.input{
  width:100%;
  max-width:300px;
  padding:12px;
  text-align:center;
  border-radius:10px;
  border:2px solid #222;
  background:#1a1a1a;
  color:#fff;
  outline:none;
}

/* ✨ انيميشن دخول */
.fade-out{
  opacity:0;
  transform:scale(0.95);
  transition:0.4s ease;
}

.fade-in{
  animation:show 0.6s ease forwards;
}

@keyframes show{
  0%{
    opacity:0;
    transform:translateY(30px);
  }
  100%{
    opacity:1;
    transform:translateY(0);
  }
}

/* التطبيق */
#app{
  display:none;
  min-height:100vh;
  padding:20px;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login">

  <div class="title">حصريات حسو</div>

  <div style="opacity:0.7;">رمز الدخول</div>

  <div class="code-big" onclick="copy()">1234</div>

  <button class="btn copy" onclick="copy()">نسخ</button>

  <button class="btn paste" onclick="paste()">لصق</button>

  <input id="code" class="input" placeholder="كلمة المرور">

  <button class="btn enter" onclick="enter()">دخول</button>

</div>

<!-- 📁 APP -->
<div id="app">
  <h2 style="color:#f5c518">تم الدخول ✔</h2>
</div>

<script>

function copy(){
  navigator.clipboard.writeText("1234");
}

async function paste(){
  try{
    const t = await navigator.clipboard.readText();
    document.getElementById("code").value = t;
  }catch(e){}
}

/* 🚀 دخول مع انيميشن */
function enter(){

  if(document.getElementById("code").value !== "1234") return;

  const login = document.getElementById("login");
  const app = document.getElementById("app");

  login.classList.add("fade-out");

  setTimeout(()=>{
    login.style.display="none";
    app.style.display="block";
    app.classList.add("fade-in");
  },400);
}

</script>

</body>
</html>
