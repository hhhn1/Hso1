<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار</title>
</head>
<body style="background:#0a0a0a; color:white; font-family:sans-serif; padding:20px;">
<h2>المقاطع:</h2>
<div id="list"></div>
<script>
const API = "https://script.google.com/macros/s/AKfycbyX8NHivy6jol4eTMpBVFacJ7_V5sJtYupsNFQZfevy4KEnnqk5Ib9TiZ-C7LUaIhdP/exec";

fetch(API)
  .then(res => res.json())
  .then(data => {
    if (data.length === 0) {
      document.getElementById('list').innerHTML = '❌ لا توجد بيانات';
    } else {
      document.getElementById('list').innerHTML = data.map(item => 
        `<div style="background:#111; padding:10px; margin:5px; border-radius:5px;">${item.name}</div>`
      ).join('');
    }
  })
  .catch(err => {
    document.getElementById('list').innerHTML = '❌ فشل: ' + err;
  });
</script>
</body>
</html>
